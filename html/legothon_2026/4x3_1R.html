<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link href="https://fonts.cdnfonts.com/css/gobold" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet">              
        <style>
            :root {
                --legothon-white: #e8e8e6;
                --legothon-darkgreen: 14, 101, 45;
                --legothon-greyborder: rgb(120,120,120);
                --border-width: 4px;
            }
        </style>
    </head>
    <script type="module" defer>
        import { LitElement, html, css, nothing } from 'https://esm.run/lit';
        import {classMap} from 'https://esm.run/lit/directives/class-map.js';
        import {connectToSocket, getEventForHost, toStringTime, compareTime} from '../../js/automarathon.js'
        
        class NamePlates extends LitElement {
            static properties = {
                runner1 : {type: String},
                runner1Pronoun : {type: String},
                runner2 : {type: String},
                runner2Pronoun : {type: String},
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                }
                .namePlate{
                    font-size: 3.5em;
                    text-align: center;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    font-weight: bold;
                    color: var(--legothon-white);
                    -webkit-text-stroke: 1.5px black;
                    font-transform: uppercase;
                    margin-top: 2px;
                }

                .pronounPlate{
                    font-size: 2em;
                    text-align: center;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    font-weight: bold;
                    color: var(--legothon-white);
                    -webkit-text-stroke: 0.5px black;
                    margin-top: 2px;
                }
            `;

            constructor() {
                super();
            }
            
            render() {
                return html`
                    <div class="namePlate" style="position: absolute; width: 506px; height: 59px; left: 98px; top: 127px;">
                        ${this.runner2 ? html`${this.runner1} / ${this.runner2}` : this.runner1}
                    </div>
                    <div class="pronounPlate" style="position: absolute; width: 285px; height: 36px; left: 319px; top: 190px;">
                        ${this.runner2 ? html`${this.runner1Pronoun} / ${this.runner2Pronoun}` : this.runner1Pronoun}
                    </div>
                `;
            }
        }
        customElements.define('name-plates', NamePlates);

        class RunInfo extends LitElement {
            static properties = {
                game : {type: String},
                category: {type: String},
                platform: {type: String},
                estimate: {type: String},
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                }
                
                .runInfoBox{
                    display: flex;
                    flex-direction: column;
                    justify-content: space-evenly;
                    align-items: center;
                    color: var(--legothon-white);
                    box-sizing: border-box;
                    padding: 5px;
                }
                .game{
                    font-size: 3.2em;
                    font-weight: bold;
                }
                .category{
                    font-size: 3em;
                }
                .otherInfo{
                    font-size: 2.9em;
                }
            `;

            constructor() {
                super();
            }
            
            render() {
                return html`
                    <div class="runInfoBox">
                        <div class="game">
                            ${this.game}
                        </div>
                        <div class="otherInfo">
                            ${this.platform} | EST: ${this.estimate}
                        </div>
                        <div class="category">
                            ${this.category}
                        </div>
                    </div>
                `;
            }
        }
        customElements.define('run-info', RunInfo);

        class CommentatorBox extends LitElement {
            static properties = {
                commentatorNames: {type: Array},
                commentatorPronouns: {type: Array}
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                    color: var(--legothon-white);
                }
                .commsColumn{
                    display: flex;
                    flex-direction: column;
                    background-color: rgba(var(--legothon-darkgreen), 0.6);
                    box-sizing: border-box;
                    padding: 15px;
                    border-radius: 10px;
                    border: var(--border-width) solid var(--legothon-greyborder);
                }
                .commsBox{
                    font-size: 2.3em;
                    display: flex;
                    flex-direction: row;
                    font-weight: bold;
                    align-items: center;
                    gap: 10px;
                }
                .commsPronounBox{
                    display: flex;
                    flex-direction: row;
                    background-color: rgba(var(--legothon-darkgreen), 0.6);
                    font-size: 2.3em;
                    font-weight: bold;
                    box-sizing: border-box;
                    padding: 10px;
                    justify-content: center;
                    align-items: center;
                    border-radius: 10px;
                    margin-top: 20px;
                    border: var(--border-width) solid var(--legothon-greyborder);
                }
            `;

            constructor() {
                super();
            }
            
            render() {
                return this.commentatorNames && html`
                    <div class="commsColumn">
                        ${this.commentatorNames.map((name,index)=>{
                            return html`<div class="commsBox">
                                 <img src="miccropped.png" style="margin-top: -2px;"/> <span>${name}</span>
                            </div>`
                        })}
                    </div>
                    ${this.commentatorPronouns && (this.commentatorNames.length == this.commentatorPronouns.length) &&
                        html`<div class="commsPronounBox">
                        ${this.commentatorPronouns.join(', ')}
                    </div>`}
                `;
            }
        }
        customElements.define('commentator-box', CommentatorBox);

        class SocialsBox extends LitElement {
            static properties = {
                commentatorNames: {type: Array},
                commentatorPronouns: {type: Array}
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                    font-size: 2.5em;
                    font-weight: bold;
                    color: var(--legothon-white);
                }
                .socialsBox{
                    display: grid;
                    grid-template-columns: 1fr 9fr; 
                    gap: 5px 20px;
                    background-color: rgba(var(--legothon-darkgreen), 0.6);
                    box-sizing: border-box;
                    padding: 15px;
                    border-radius: 10px;  
                    align-items: center;
                    border: var(--border-width) solid var(--legothon-greyborder);  
                }
                svg{
                   fill: var(--legothon-white);
                   stroke:  var(--legothon-white);
                }
            `;

            constructor() {
                super();
            }
            
            render() {
                return html`
                <div class="socialsBox">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><!--!Font Awesome Free v7.3.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M492.5 69.8c-.2-.3-.4-.6-.8-.7-38.1-17.5-78.4-30-119.7-37.1-.4-.1-.8 0-1.1 .1s-.6 .4-.8 .8c-5.5 9.9-10.5 20.2-14.9 30.6-44.6-6.8-89.9-6.8-134.4 0-4.5-10.5-9.5-20.7-15.1-30.6-.2-.3-.5-.6-.8-.8s-.7-.2-1.1-.2c-41.3 7.1-81.6 19.6-119.7 37.1-.3 .1-.6 .4-.8 .7-76.2 113.8-97.1 224.9-86.9 334.5 0 .3 .1 .5 .2 .8s.3 .4 .5 .6c44.4 32.9 94 58 146.8 74.2 .4 .1 .8 .1 1.1 0s.7-.4 .9-.7c11.3-15.4 21.4-31.8 30-48.8 .1-.2 .2-.5 .2-.8s0-.5-.1-.8-.2-.5-.4-.6-.4-.3-.7-.4c-15.8-6.1-31.2-13.4-45.9-21.9-.3-.2-.5-.4-.7-.6s-.3-.6-.3-.9 0-.6 .2-.9 .3-.5 .6-.7c3.1-2.3 6.2-4.7 9.1-7.1 .3-.2 .6-.4 .9-.4s.7 0 1 .1c96.2 43.9 200.4 43.9 295.5 0 .3-.1 .7-.2 1-.2s.7 .2 .9 .4c2.9 2.4 6 4.9 9.1 7.2 .2 .2 .4 .4 .6 .7s.2 .6 .2 .9-.1 .6-.3 .9-.4 .5-.6 .6c-14.7 8.6-30 15.9-45.9 21.8-.2 .1-.5 .2-.7 .4s-.3 .4-.4 .7-.1 .5-.1 .8 .1 .5 .2 .8c8.8 17 18.8 33.3 30 48.8 .2 .3 .6 .6 .9 .7s.8 .1 1.1 0c52.9-16.2 102.6-41.3 147.1-74.2 .2-.2 .4-.4 .5-.6s.2-.5 .2-.8c12.3-126.8-20.5-236.9-86.9-334.5zm-302 267.7c-29 0-52.8-26.6-52.8-59.2s23.4-59.2 52.8-59.2c29.7 0 53.3 26.8 52.8 59.2 0 32.7-23.4 59.2-52.8 59.2zm195.4 0c-29 0-52.8-26.6-52.8-59.2s23.4-59.2 52.8-59.2c29.7 0 53.3 26.8 52.8 59.2 0 32.7-23.2 59.2-52.8 59.2z"/></svg>
                    <div>! Discord</div>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><!--!Font Awesome Free v7.3.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M549.7 124.1C543.5 100.4 524.9 81.8 501.4 75.5 458.9 64 288.1 64 288.1 64S117.3 64 74.7 75.5C51.2 81.8 32.7 100.4 26.4 124.1 15 167 15 256.4 15 256.4s0 89.4 11.4 132.3c6.3 23.6 24.8 41.5 48.3 47.8 42.6 11.5 213.4 11.5 213.4 11.5s170.8 0 213.4-11.5c23.5-6.3 42-24.2 48.3-47.8 11.4-42.9 11.4-132.3 11.4-132.3s0-89.4-11.4-132.3zM232.2 337.6l0-162.4 142.7 81.2-142.7 81.2z"/></svg>
                    <div>LEGOSpeedrunning</div>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><!--!Font Awesome Free v7.3.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M459.4 151.7c.3 4.5 .3 9.1 .3 13.6 0 138.7-105.6 298.6-298.6 298.6-59.5 0-114.7-17.2-161.1-47.1 8.4 1 16.6 1.3 25.3 1.3 49.1 0 94.2-16.6 130.3-44.8-46.1-1-84.8-31.2-98.1-72.8 6.5 1 13 1.6 19.8 1.6 9.4 0 18.8-1.3 27.6-3.6-48.1-9.7-84.1-52-84.1-103l0-1.3c14 7.8 30.2 12.7 47.4 13.3-28.3-18.8-46.8-51-46.8-87.4 0-19.5 5.2-37.4 14.3-53 51.7 63.7 129.3 105.3 216.4 109.8-1.6-7.8-2.6-15.9-2.6-24 0-57.8 46.8-104.9 104.9-104.9 30.2 0 57.5 12.7 76.7 33.1 23.7-4.5 46.5-13.3 66.6-25.3-7.8 24.4-24.4 44.8-46.1 57.8 21.1-2.3 41.6-8.1 60.4-16.2-14.3 20.8-32.2 39.3-52.6 54.3z"/></svg>
                    <div>@LSpeedruns</div>
                </div>
                `;
            }
        }
        customElements.define('socials-box', SocialsBox);
    </script>
    <body style="width: 1920px; height: 1080px; margin: 0px; background-image: url('boxless_background/4x3_1R_Template_2026.png');">
        <name-plates runner1="Siedemnastek" runner1Pronoun="he/him" runner2="Olive" runner2Pronoun="she/her"></name-plates>
        <div style="position: absolute; display: flex; flex-direction: column; width: 601px; height: 661px; top: 230px; left: 0px;
            gap: 15px;
            box-sizing: border-box;
            padding: 10px;
        ">
            <div style="width: 100%;">
                <run-info game="Bionicle: The Game" category="Any% NTS" platform="Gamecube" estimate="2:32:23"></run-info>
            </div>
            <div style="width: 100%; box-sizing: border-box; padding-left: 50px; padding-right: 50px; display: flex; flex-direction: column; gap: 20px;">
                <commentator-box commentatorNames='["Siedemnastek","Javster101 [HOST]"]' commentatorPronouns='["he/him", "he/him"]'></commentator-box>
                <socials-box></socials-box>
            </div>
        </div>
    </body>
    <script type="module" src="../../js/legothon_2026.js"></script>
</html>

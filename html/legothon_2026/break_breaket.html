<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link href="https://fonts.cdnfonts.com/css/gobold" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet">              
        <style>
            :root {
                --legothon-white: #e8e8e6;
                --legothon-darkgreen: 14, 101, 45;
                --legothon-greyborder: rgb(120,120,120);
                --border-width: 4px;
            }
            .header{
                text-align: center;
                font-weight: bold;
                font-family: "Bebas Neue", sans-serif;
                color: var(--legothon-white);
                font-size: 6em;
                padding-top: 120px;
                box-sizing: border-box;
            }
            .mainbox{
                width: 100%;
                display: flex;
                flex-direction: row;
                justify-content: space-evenly;
                color: var(--legothon-white);
                font-weight: bold;
                font-family: "Bebas Neue", sans-serif;
                gap: 10px;
            }
            .optionColumn{
                display: flex;
                flex-direction: column;
                align-items: center;
                flex: 1;
            }
            .vs{
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: var(--legothon-white);
                font-weight: bold;
                font-family: "Bebas Neue", sans-serif;
                font-size: 10em;
            }
            .levelName{
                font-size: 5em;
                text-align: center;
                min-height: 150px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-transform: uppercase;
                border-radius: 10px;
                border: 2px solid white;
                box-shadow: 4px 4px 10px black;
                background-color: rgba(var(--legothon-darkgreen), 0.6);
                box-sizing: border-box;
                padding: 20px;
                padding-left: 40px;
                padding-right: 40px;
                justify-content: center;
            }
            .game{
                font-size: 2.3em;
                text-align: center;
                font-style: italic;
                min-height: 100px;
                margin-top: 30px;
            }
            .levelImage{
                border-radius: 10px;
                width: 540px;
                height: auto;
                aspect-ratio: 16 / 9; 
                object-fit: cover;  
                border: 2px solid white;
                box-shadow: 4px 4px 10px black;
            }
        </style>
    </head>
    <body style="width: 1920px; height: 1080px; margin: 0; background-image: url('boxless_background/Generic_Blank_Template_2026.png');">
        <div style="position: absolute; top: 0px; left: 0px; width: 1920px; height: 1080px; display: flex; flex-direction: column;
                    box-sizing: border-box;
                    padding: 35px; ">
            <div class="header" id="quiz_1">
                Quiz
            </div>
            <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; flex-grow: 1; margin-bottom: 100px;">
                <div class="mainbox" id="optionsBox">
                </div>
            </div>
        </div>
    </body>

        var custom = {"quizQuestion": "What % of all Lego Star Wars levels have you play as a member of the Skywalker family?", 
        "quizOptions": "53%;57%;65%;70%"};

            var questionString = custom["quizQuestion"];
            var questionOptions = custom["quizOptions"].split(";");

            document.getElementById("quiz_1").innerHTML = questionString;

            var options = document.getElementById("optionsBox");
            options.innerHTML = "";

            questionOptions.forEach(element => {
                options.innerHTML += '<div class="optionColumn"><div class="levelName">' + element.trim() +
                    '</div></div>';
            });
    </script>
</html>

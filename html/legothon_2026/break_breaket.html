<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link href="https://fonts.cdnfonts.com/css/gobold" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet">              
        <style>
            :root {
                --legothon-white: #e8e8e6;
                --legothon-darkgreen: 14, 101, 45;
                --legothon-greyborder: rgb(120,120,120);
                --border-width: 4px;
            }
            .header{
                text-align: center;
                font-weight: bold;
                font-family: "Bebas Neue", sans-serif;
                color: var(--legothon-white);
                font-size: 9em;
                margin-top: 30px;
            }
            .mainbox{
                width: 100%;
                display: flex;
                flex-direction: row;
                justify-content: space-evenly;
                color: var(--legothon-white);
                font-weight: bold;
                font-family: "Bebas Neue", sans-serif;
                margin-top: 70px;
                gap: 10px;
            }
            .optionColumn{
                display: flex;
                flex-direction: column;
                align-items: center;
                flex: 1;
            }
            .vs{
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: var(--legothon-white);
                font-weight: bold;
                font-family: "Bebas Neue", sans-serif;
                font-size: 10em;
            }
            .levelName{
                font-size: 4.2em;
                text-align: center;
                min-height: 150px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-transform: uppercase;
            }
            .game{
                font-size: 2.3em;
                text-align: center;
                font-style: italic;
                min-height: 100px;
                margin-top: 30px;
            }
            .levelImage{
                border-radius: 10px;
                width: 540px;
                height: auto;
                aspect-ratio: 16 / 9; 
                object-fit: cover;  
                border: 2px solid white;
                box-shadow: 4px 4px 10px black;
            }
        </style>
    </head>
    <body style="width: 1920px; height: 1080px; margin: 0; background-image: url('boxless_background/Generic_Blank_Template_2026.png');">
        <div style="position: absolute; top: 0px; left: 0px; width: 1920px; height: 1080px; display: flex; flex-direction: column;
                    box-sizing: border-box;
                    padding: 35px;">
            <div class="header">
                TT LEVEL NAMES THROWDOWN
            </div>
            <div class="mainbox">
                <div class="optionColumn">
                    <div class="levelName">
                        Once Upon a Time Machine in the West
                    </div>
                    <img class="levelImage" src="contest1/OnceUpon.PNG"/>
                    <div class="game">
                        LEGO Dimensions
                    </div>
                </div>
                <div class="vs">VS</div>
                <div class="optionColumn">
                    <div class="levelName">
                        C-3P-Oh no!
                    </div>
                    <img class="levelImage" src="contest1/C3POhNo.png"/>
                    <div class="game">
                        LEGO Star Wars: The Skywalker Saga
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>

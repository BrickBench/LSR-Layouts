<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/gobold" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet"> 
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    </head>
    <body style="background-color: black; background-image: url('./backgrounds/Coming_Up_Video_Screen.png')">
        <static-bar donoTotal="9999"></static-bar>
    </body>
    <script type="module" defer>
        import { LitElement, html, css, nothing } from 'https://esm.run/lit';
        import {classMap} from 'https://esm.run/lit/directives/class-map.js';
        import {connectToSocket, getEventForHost, toStringTime, getEventTimerValue, getEventById} from '../../js/automarathon.js'

        // Non-carousel bar elements
        class StaticBar extends LitElement {
            static properties = {
                // percent from 0 to 1
                donoPercent: {type: Number},
                // total donated money
                donoTotal: {type: Number}
            };

            static styles = css`
                .donation-total{
                    box-sizing: border-box; padding: 5px; text-align: center;
                    font-family: 'Bebas Neue', sans-serif;
                    color: white;
                    font-weight: bold;
                    font-size: 5.4em;
                }
            `;

            constructor() {
                super();
            }
            render() {
                return html`
                    <div class="donation-total" style="position: absolute; top: 972px; left: 1598px; width: 322px; height: 96px; line-height: 96px; ">
                        $${Math.round(this.donoTotal)}
                    </div>
                `;
            }
        }
        customElements.define('static-bar', StaticBar);

        // list of up next elements
        class UpNext extends LitElement {
            static properties = {
                idx: {type: Number},
                game: {type: String},
                category: {type: String},
                console: {type: String},
                // array of names
                runners: {type: Array},
                time: {type: Number},
            };

            constructor() {
            }
            render() {}
        }

        class DonationGoal extends LitElement {
            static properties = {
                total: {type: Number},
                goal: {type: Number}
            };

            constructor() {
            }
            render() {}
        }

        class RecentDonations extends LitElement {
            static properties = {
                amounts: {type: Number},
                donator: {type: String}
            };

            constructor() {
            }
            render() {}
        }

        class SingleIncentive extends LitElement {
            static properties = {
                game: {type: String},
                incentive: {type: String},
                amount: {type: Number},
                target: {type: Number}
            };

            constructor() {
            }
            render() {}
        }

        // competing incentive race
        class MultiIncentive extends LitElement {
            static properties = {
                game: {type: String},
                incentive: {type: String},
                values: {type: Array},
                amounts: {type: Array},
            };

            constructor() {
            }
            render() {}
        }

        class BottomBarControl extends LitElement {
            static properties = {
                // donation total is always good
                donationsGood: {type: Boolean},
                upNext1Good: {type: Boolean},
                upNext2Good: {type: Boolean},
                upNext3Good: {type: Boolean},
                singleIncentive1Good: {type: Boolean},
                singleIncentive2Good: {type: Boolean},
                multiIncentive1Good: {type: Boolean},
                multiIncentive2Good: {type: Boolean},
                readyToChange: {type: Boolean}
            };

            constructor() {
            }
            render() {}
        }

        const this_host = "main";
        var next_data = null;

        function populateNextEvent(data, event, element) {
            element.game = event.game;
            element.category = event.category;
            element.console = event.console;
            element.runners = getEventRunners(event);
            element.startTime = event.event_start_time;
        }

        function populateBottomBar(data) {
            var next_event_1_elem = document.getElementById("up-next-1");
            var next_event_2_elem = document.getElementById("up-next-2");
            var next_event_3_elem = document.getElementById("up-next-3");

            var bar_control = document.getElementById("bottom-bar-control");
            var next_events = getUpcomingEvents(data);
            if (next_events.length > 0) {
                populateNextEvent(data, next_events[0], next_event_1_elem);
                bar_control.upNext1Good = true;
            } else {
                bar_control.upNext1Good = false;
            }

            if (next_events.length > 1) {
                populateNextEvent(data, next_events[1], next_event_2_elem);
                bar_control.upNext2Good = true;
            } else {
                bar_control.upNext2Good = false;
            }

            if (next_events.length > 2) {
                populateNextEvent(data, next_events[2], next_event_3_elem);
                bar_control.upNext3Good = true;
            } else {
                bar_control.upNext3Good = false;
            }
        }

        setInterval(function() {
            var bar_control = document.getElementById("bottom-bar-control");
            if (next_data != null && bar_control.readyToChange) {
                populateBottomBar(next_data);
                next_data = null;
            }
        }, 500);

        connectToSocket('/ws', function(data) {
            var next_events = getUpcomingEvents(data);

            var static_bottom_bar = document.getElementById("static-bottom-bar");
            static_bottom_bar.donoPercent = data.custom_fields["total-donations"] / data.custom_fields["goal-donations"];
            static_bottom_bar.donoTotal = data.custom_fields["total-donations"];

            var bar_control = document.getElementById("bottom-bar-control");

            next_data = data;
        });
    </script>
</html>

<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/gobold" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet"> 
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
        <style>
            :root {
                --legothon-white: #e8e8e6;
                --legothon-darkgreen: 14, 101, 45;
                --legothon-greyborder: rgb(120,120,120);
                --border-width: 4px;
            }
        </style>
    </head>
    <body style="background-color: black; background-image: url('./backgrounds/Coming_Up_Video_Screen.png');/*background-color: transparent;*/">
        <static-bar donoTotal="0"></static-bar>
        <bottom-bar-control multiIncentive1Good="true" multiIncentive2Good="true" donationsGood="true"></bottom-bar-control>
    </body>
    <script type="module" defer>
        import { LitElement, html, css, nothing } from 'https://esm.run/lit';
        import {classMap} from 'https://esm.run/lit/directives/class-map.js';
        import {connectToSocket, getEventForHost, toStringTime, getEventTimerValue, getEventById, getUpcomingEvents, getEventRunners} from '../../js/automarathon.js'

        const intervalId = setInterval(() => {
            const slideshow = document.querySelector("bottom-bar-control");
            //slideshow.nextSlide();
        }, 8000);

        gsap.registerEffect({
            name: "swapText",
            effect: (targets, config) => {
            let tl = gsap.timeline({delay: config.delay});
            tl.to(targets, {opacity: 0, duration: config.duration / 2});
            tl.add(() => targets[0].innerText = config.text);
            tl.to(targets, {opacity: 1, duration: config.duration});
            return tl;
            },
            defaults: {duration: 0.5}, 
            extendTimeline: true
        });

        // Non-carousel bar elements
        class StaticBar extends LitElement {
            static properties = {
                // percent from 0 to 1
                donoPercent: {type: Number},
                // total donated money
                donoTotal: {type: Number}
            };

            static styles = css`
                .donation-total{
                    box-sizing: border-box; padding: 5px; text-align: center;
                    font-family: 'Bebas Neue', sans-serif;
                    color: white;
                    font-weight: bold;
                    font-size: 5.4em;
                }
            `;

            constructor() {
                super();
            }
            render() {
                return html`
                    <div class="donation-total" style="position: absolute; top: 972px; left: 1598px; width: 322px; height: 96px; line-height: 96px; ">
                        $${Math.round(this.donoTotal)}
                    </div>
                `;
            }
        }
        customElements.define('static-bar', StaticBar);

        // list of up next elements
        class UpNext extends LitElement {
            static properties = {
                idx: {type: Number},
                game: {type: String},
                category: {type: String},
                console: {type: String},
                // array of names
                runners: {type: Array},
                time: {type: Number},
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                    width: 100%;
                    height: 100%;
                    color: white;
                }
                
                .bottom-bar-container{
                    width: 100%;
                    height: 100%;
                    display: flex;
                    flex-direction: row;
                    align-items: center;
                }

                .game{
                    font-size: 1.7em;
                    font-weight: bold;
                }

                .category{
                    font-size: 1.7em;
                    font-weight: bold;
                    font-style: italic;
                }

                .time{
                    font-size: 2.4em;
                    font-weight: bold;
                }
            `;

            constructor() {
                super();
            }

            getRelativeTimeString(unix_time) {
                var time = unix_time - Date.now();
                console.log("Time until next event: " + time);
                var text = "Later"
                if (time) {
                    var mins = time / (1000 * 60);
                    if (mins > 2) {
                        if (mins < 60) {
                            text = "IN " + Math.floor(mins) + " MINUTES";
                        } else if (mins < 120) {
                            text = "IN 1 HOUR";
                        } else {
                            text = "IN " + Math.floor(mins / 60) + " HOURS";
                        }
                    }

                }
                return text;
            }

            render() {
                return html`
                    <div class="bottom-bar-container">
                        <div style="display: flex; flex-direction: column; justify-content: center; margin-right: auto;">
                            <div class="game">
                                ${this.game}
                            </div>
                            <div class="category">
                                ${this.category}
                            </div>
                        </div>
                        <div class="time">
                            ${this.getRelativeTimeString(this.time)}
                        </div>
                    </div>
                `;
            }
        }

        customElements.define('up-next', UpNext);

        class DonationGoal extends LitElement {
            static properties = {
                total: {type: Number},
                goal: {type: Number}
            };

            constructor() {
            }
            render() {}
        }

        class RecentDonations extends LitElement {
            static properties = {
                amounts: {type: Number},
                donator: {type: String}
            };

            static styles = css`
                .name{
                    text-align: center;
                    font-family: 'Bebas Neue', sans-serif;
                    color: white;
                    font-weight: bold;
                    font-size: 1.8em;
                }
                .donation{
                    text-align: center;
                    font-family: 'Bebas Neue', sans-serif;
                    color: white;
                    font-weight: bold;
                    font-size: 1.8em;
                }
            `;

            constructor() {
                super();
            }
            render() {
                return html`
                    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; padding-top: 5px;
                    width: 192px;">
                        <div class="name">
                            ${this.donator}
                        </div>
                        <div class="donation">
                            $${this.amounts}
                        </div>
                    </div>
                `;
            }
        }
        customElements.define('recent-donation', RecentDonations);

        class SingleIncentive extends LitElement {
            static properties = {
                game: {type: String},
                incentive: {type: String},
                amount: {type: Number},
                target: {type: Number}
            };

            constructor() {
            }
            render() {}
        }

        // competing incentive race
        class MultiIncentive extends LitElement {
            static properties = {
                game: {type: String},
                incentive: {type: String},
                values: {type: Array},
                amounts: {type: Array},
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                    width: 100%;
                    height: 100%;
                    color: white;
                }
                
                .bottom-bar-container{
                    width: 100%;
                    height: 100%;
                    display: flex;
                    flex-direction: row;
                    justify-content: center;
                }

                .game{
                    font-size: 1.7em;
                    font-weight: bold;
                }

                .incentive{
                    font-size: 1.7em;
                    font-weight: bold;
                    font-style: italic;
                }

                .multi-box{
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                }
                
                .incentive-name{
                    font-size: 1.75em;
                    font-weight: bold;
                    text-align: center;
                }

                .incentive-amount{
                    font-size: 1.75em;
                    font-weight: bold;
                    text-align: center;
                }
            `;

            constructor() {
                super();
            }
            render() {
                return html`
                    <div class="bottom-bar-container">
                        <div style="display: flex; flex-direction: column; justify-content: center;">
                            <div class="game">
                                ${this.game}
                            </div>
                            <div class="incentive">
                                ${this.incentive}
                            </div>
                        </div>
                        <div style="display: flex; flex-direction: row; justify-content: space-evenly; flex-grow: 1; ">
                        ${this.amounts.map((entry, index)=>{
                            return html`
                                <div class="multi-box">
                                    <div class="incentive-name">
                                        ${this.values[index]}
                                    </div>
                                    <div class="incentive-amount">
                                        $${entry}
                                    </div>  
                                </div>
                            `;
                        })}
                        </div>
                    </div>
                `;
            }
        }
        customElements.define('multi-incentive', MultiIncentive);

        class BottomBarControl extends LitElement {
            static properties = {
                // donation total is always good
                donationsGood: {type: Boolean},
                upNext1Good: {type: Boolean},
                upNext2Good: {type: Boolean},
                upNext3Good: {type: Boolean},
                singleIncentive1Good: {type: Boolean},
                singleIncentive2Good: {type: Boolean},
                multiIncentive1Good: {type: Boolean},
                multiIncentive2Good: {type: Boolean},
                readyToChange: {type: Boolean},
                _slideIndex: {type: Number}
            };

            static styles = css`
                .header{
                    font-family: 'Bebas Neue', sans-serif;
                    font-size: 3.3em;
                    font-weight: bold;
                    text-align: center;
                    color: white;
                }
                
                .bottom-slide{
                    position: absolute;
                    width: 1022px;
                    height: 79px;
                    left: 597px;
                    top: 989px;
                    padding-left: 30px;
                    padding-right: 30px;
                    box-sizing: border-box;
                }
            `;

            nextSlide(){
                const slideHeaders = ["DONATIONS", "UP NEXT", "LATER", "INCENTIVE", "INCENTIVE", "INCENTIVE", "INCENTIVE", "TARGET"];
                const slideBools = [this.donationsGood, this.upNext1Good, this.upNext2Good, this.singleIncentive1Good, this.singleIncentive2Good,
                    this.multiIncentive1Good, this.multiIncentive2Good, true];
                const slideIDs = ["donation-slide","upNext","later","singleIncentive1","singleIncentive2","multiIncentive1","multiIncentive2","target"];

                let header = this.renderRoot.getElementById("slide-header");

                let prevSlide = this._slideIndex;

                while(true){
                    this._slideIndex += 1;
                    this._slideIndex %= slideHeaders.length;
                    if(slideBools[this._slideIndex]){
                        break;
                    }
                }

                let prevSlideElem = this.renderRoot.getElementById(slideIDs[prevSlide]);
                let curSlideElem = this.renderRoot.getElementById(slideIDs[this._slideIndex]);

                var tl = gsap.timeline({});
                tl.swapText(header, {text: slideHeaders[this._slideIndex], delay: 1}).to(curSlideElem, { 
                    autoAlpha: 1, 
                    duration: 0.5 
                }, "-=0.5")
                .from(prevSlideElem, { 
                    autoAlpha: 0, 
                    duration: 0.5 
                }, "-=0.5");

            }

            constructor() {
                super();
                this._slideIndex = 7;

            }
            render() {
                return html`
                    <div class="header" style="position: absolute; top: 989px; left: 370px; width: 235px; height: 79px; line-height: 79px;" id="slide-header">
                        DONATIONS
                    </div>
                    <div id="donation-slide" class="bottom-slide" style="display: flex; flex-direction: row; gap: 10px; opacity: 0;"">
                        <recent-donation id="donor-1" donator="Gustative" amounts="12.32"></recent-donation>
                        <svg xmlns="http://www.w3.org/2000/svg" style="width: 40px;"viewBox="0 0 20 77">
                            <line x1="20" y1="0" x2="0" y2="77" stroke-width="4" stroke="white" />
                        </svg>
                        <recent-donation id="donor-2" donator="CAPTAINPAXO" amounts="12.32"></recent-donation>
                        <svg xmlns="http://www.w3.org/2000/svg" style="width: 40px;"viewBox="0 0 20 77">
                            <line x1="20" y1="0" x2="0" y2="77" stroke-width="4" stroke="white" />
                        </svg>
                        <recent-donation id="donor-3" donator="SIEDEMNASTEK" amounts="12.32"></recent-donation>
                        <svg xmlns="http://www.w3.org/2000/svg" style="width: 40px;"viewBox="0 0 20 77">
                            <line x1="20" y1="0" x2="0" y2="77" stroke-width="4" stroke="white" />
                        </svg>
                        <recent-donation id="donor-4" donator="Gustative" amounts="12.32"></recent-donation>
                    </div>
                    <div id="upNext" class="bottom-slide">
                        <up-next id="next-1" time="1784456295000" game="LEGO Indiana Jones: The Original Adventures"
        category="Raiders of the Lost Ark No 0HP"></up-next>
                    </div>
                    <div id="later" class="bottom-slide" style="opacity: 0;">
                        <up-next id="next-2" time="1784456295000" game="LEGO Indiana Jones: The Original Adventures"
        category="Raiders of the Lost Ark No 0HP"></up-next>
                    </div>
                    <div id="singleIncentive1" class="bottom-slide" style="opacity: 0;">
                    </div>
                    <div id="singleIncentive2" class="bottom-slide" style="opacity: 0;">
                    </div>
                    <div id="multiIncentive1" class="bottom-slide" style="opacity: 0;">
                        <multi-incentive game="LEGO Star Wars II: The Original Trilogy" incentive="Category Bid War" values='["Any%","Intended%"]' amounts='[0,0]' ></multi-incentive>
                    </div>
                    <div id="multiIncentive2" class="bottom-slide" style="opacity: 0;">
                        <multi-incentive game="LEGO Star Wars III: The Original Trilogy" incentive="Category Bid War" values='["Any%","Intended%"]' amounts='[0,0]' ></multi-incentive>
                    </div>
                    <div id="target" class="bottom-slide" style="opacity: 0;">
                    </div>
                `;
            }
        }
        customElements.define('bottom-bar-control', BottomBarControl);

        const this_host = "main";
        var next_data = null;

        function populateNextEvent(data, event, element) {
            element.game = event.game;
            element.category = event.category;
            element.console = event.console;
            element.runners = getEventRunners(event);
            element.time = event.event_start_time;
        }

        function populateDonation(donation, root, idx) {
            var element = root.renderRoot.getElementById("donor-" + idx);
            var donation_info = donation.split(";");
            if (donation_info.length < 2) {
                donation_info = ["", ""];
            }
            element.donator = donation_info[0];
            element.amounts = donation_info[1];
        }

        function populateBottomBar(data) {
            var main = document.querySelector("bottom-bar-control");

            var donation_total_elem = document.querySelector("static-bar");
            donation_total_elem.donoTotal = data.custom_fields["total-donations"];

            var next_event_1_elem = main.renderRoot.getElementById("next-1");
            var next_event_2_elem = main.renderRoot.getElementById("next-2");

            var next_events = getUpcomingEvents(data);
            if (next_events.length > 0) {
                populateNextEvent(data, next_events[0], next_event_1_elem);
                main.upNext1Good = true;
            } else {
                main.upNext1Good = false;
            }

            if (next_events.length > 1) {
                populateNextEvent(data, next_events[1], next_event_2_elem);
                main.upNext2Good = true;
            } else {
                main.upNext2Good = false;
            }

 
            populateDonation(data.custom_fields["donation-1"], main, 1);
            populateDonation(data.custom_fields["donation-2"], main, 2);
            populateDonation(data.custom_fields["donation-3"], main, 3);
            populateDonation(data.custom_fields["donation-4"], main, 4);
            main.donationsGood = true;
        }

        setInterval(function() {
            var bar_control = document.getElementById("bottom-bar-control");
            if (next_data != null && bar_control.readyToChange) {
                populateBottomBar(next_data);
                next_data = null;
            }
        }, 500);

        connectToSocket('/ws', function(data) {
            var next_events = getUpcomingEvents(data);


            //var bar_control = document.getElementById("bottom-bar-control");

            next_data = data;
            populateBottomBar(next_data);
        });
    </script>
</html>

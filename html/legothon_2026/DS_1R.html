<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link href="https://fonts.cdnfonts.com/css/gobold" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet">              
        <style>
            :root {
                --legothon-white: #e8e8e6;
                --legothon-darkgreen: 14, 101, 45;
                --legothon-greyborder: rgb(120,120,120);
                --border-width: 4px;
            }
        </style>
    </head>
    <script type="module" defer>
        import { LitElement, html, css, nothing } from 'https://esm.run/lit';
        import {classMap} from 'https://esm.run/lit/directives/class-map.js';
        import {connectToSocket, getEventForHost, toStringTime, compareTime} from '../../js/automarathon.js'
        
        class NamePlates extends LitElement {
            static properties = {
                runner1 : {type: String},
                runner1Pronoun : {type: String},
                runner2 : {type: String},
                runner2Pronoun : {type: String},
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                }
                .namePlate{
                    font-size: 2.1em;
                    text-align: center;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    font-weight: bold;
                    color: var(--legothon-white);
                    -webkit-text-stroke: 0.7px black;
                    font-transform: uppercase;
                    margin-top: 2px;
                }

                .pronounPlate{
                    font-size: 1.2em;
                    text-align: center;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    font-weight: bold;
                    color: var(--legothon-white);
                    -webkit-text-stroke: 0.25px black;
                    margin-top: 2px;
                }
            `;

            constructor() {
                super();
            }
            
            render() {
                return html`
                    <div class="namePlate" style="position: absolute; width: 331px; height: 38px; left: 0px; top: 561px;">
                        ${this.runner2 ? html`${this.runner1} / ${this.runner2}` : this.runner1}
                    </div>
                    <div class="pronounPlate" style="position: absolute; width: 188px; height: 24px; left: 0px; top: 602px;">
                        ${this.runner2 ? html`${this.runner1Pronoun} / ${this.runner2Pronoun}` : this.runner1Pronoun}
                    </div>
                `;
            }
        }
        customElements.define('name-plates', NamePlates);

        class RunInfo extends LitElement {
            static properties = {
                game : {type: String},
                category: {type: String},
                platform: {type: String},
                estimate: {type: String},
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                }
                
                .runInfoBox{
                    display: flex;
                    flex-direction: column;
                    justify-content: space-evenly;
                    align-items: center;
                    color: var(--legothon-white);
                    box-sizing: border-box;
                    padding: 5px;
                }
                .game{
                    font-size: 2.2em;
                    font-weight: bold;
                }
                .category{
                    font-size: 2.2em;
                }
                .otherInfo{
                    font-size: 2.1em;
                }
            `;

            constructor() {
                super();
            }
            
            render() {
                return html`
                    <div class="runInfoBox">
                        <div class="game">
                            ${this.game}
                        </div>
                        <div class="otherInfo">
                            ${this.platform} | EST: ${this.estimate}
                        </div>
                        <div class="category">
                            ${this.category}
                        </div>
                    </div>
                `;
            }
        }
        customElements.define('run-info', RunInfo);

        class CommentatorBox extends LitElement {
            static properties = {
                commentatorNames: {type: Array},
                commentatorPronouns: {type: Array}
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                    color: var(--legothon-white);
                }
                .commsColumn{
                    display: flex;
                    flex-direction: row;
                    background-color: rgba(var(--legothon-darkgreen), 0.6);
                    box-sizing: border-box;
                    padding: 5px;
                    border-radius: 10px;
                    justify-content: space-evenly;
                    align-items: center;
                    border: var(--border-width) solid var(--legothon-greyborder);
                }
                .commsBox{
                    font-size: 2.1em;
                    display: flex;
                    flex-direction: row;
                    font-weight: bold;
                }
                .commsPronounBox{
                    display: flex;
                    flex-direction: row;
                    background-color: rgba(var(--legothon-darkgreen), 0.6);
                    font-size: 2.3em;
                    font-weight: bold;
                    box-sizing: border-box;
                    padding: 10px;
                    justify-content: center;
                    align-items: center;
                    border-radius: 10px;
                    margin-top: 20px;
                    border: var(--border-width) solid var(--legothon-greyborder);
                }
            `;

            constructor() {
                super();
            }
            
            render() {
                return this.commentatorNames && html`
                    <div class="commsColumn">
                        <img src="miccropped.png" style="margin-top: -2px;"/>
                        ${this.commentatorNames.slice(0, 2).map((name,index)=>{
                            return html`<div class="commsBox">
                                ${name}
                            </div>`
                        })}
                    </div>
                `;
            }
        }
        customElements.define('commentator-box', CommentatorBox);

        class TimerElement extends LitElement {
            static properties = {
                time: {type: String},
            };

            static styles = css`
                .timer{
                    font-family: "Bebas Neue", sans-serif;
                    font-size: 110px;
                    color: white;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    font-weight: bold;
                    color: var(--legothon-white);
                    -webkit-text-stroke: 2.5px black;
                    margin-top: 4px;
                    text-align: center;
                    position:absolute; left: 0px; top: 457px;
                    width: 390px;
                    height: 100px;
                    line-height: 100px;
                    font-variant-numeric: tabular-nums; 
                }
            `;

            constructor() {
                super();
                this.time = 0;
            }

            render() {
                return html`
                    <div class="timer">
                        ${this.time}
                    </div>
                `;
            }
        }

        customElements.define('event-timer', TimerElement);
    </script>
    <script type="module" src="../../js/legothon_2026.js"></script>
    <body style="width: 1920px; height: 1080px; margin: 0px; background-image: url('boxless_background/DS_1R_Template_2026.png');">
        <name-plates runner1="Siedemnastek" runner1Pronoun="he/him" runner2="Olive" runner2Pronoun="she/her"></name-plates>
        <event-timer></event-timer>
        <div style="position: absolute; left: 0px; top: 620px; width: 603px; height: 264px; box-sizing: border-box; padding: 25px; padding-left: 40px; padding-right: 40px; display: flex; flex-direction: column; justify-content: space-evenly; gap: 10px;">
            <run-info game="LEGO Indiana Jones: The Original Adventures" category="Raiders of the Lost Ark No 0HP" platform="Gamecube" estimate="2:32:23"></run-info>
            <commentator-box commentatorNames='["Siedemnastek","Javster101 [HOST]"]' commentatorPronouns='["he/him", "he/him"]'></commentator-box>
        </div>
    </body>
</html>

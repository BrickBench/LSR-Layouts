<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.cdnfonts.com/css/gobold" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet"> 
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
        <style>
            :root {
                --legothon-white: #e8e8e6;
                --legothon-darkgreen: 14, 101, 45;
                --legothon-greyborder: rgb(120,120,120);
                --border-width: 4px;
            }
        </style>
    </head>
    <body style="background-color: black; background-image: url('./backgrounds/Coming_Up_Video_Screen.png'); margin: 0;">
        <div style="position: absolute; top: 0px; left: 0px; width: 1920px; height: 1080px; background-image: url('./backgrounds/Coming_Up_Video_Screen.png'); margin: 0; z-index: 1;"></div>
        <img src="LEGOthon Logo 2026.png" style="width: 600px; position: absolute; top: 0px; left: 40px; z-index: 2;"/>
        <run-info game="LEGO Indiana Jones: The Original Adventures" category="Any% NTS" platform="Gamecube" estimate="2:32:23" runners='["Benny", "carkoon", "Colten", "firmynator", "flup", "Lunar", "Mugen", "Sonic7"]'></run-info>
        <video-background-box video="./videos/legothon_rockbandds.mp4" audio="sample.mp3" style="z-index:-1;"></video-background-box>
    </body>
    <script type="module" defer>
        import { LitElement, html, css, nothing } from 'https://esm.run/lit';
        import {classMap} from 'https://esm.run/lit/directives/class-map.js';
        import {connectToSocket, getEventForHost, toStringTime, getEventTimerValue, getEventById, getEventRunners} from '../../js/automarathon.js'

        class VideoBackgroundBox extends LitElement {
            static properties = {
                video: {type: String},
                audio: {type: String},
                _played: {type: Boolean}
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                    font-size: 2.1em;
                    font-weight: bold;
                    color: var(--legothon-white);
                }
                .socialsBox{
                    display: grid;
                    grid-template-columns: 1fr 8fr; 
                    gap: 5px 10px;
                    background-color: rgba(var(--legothon-darkgreen), 0.6);
                    box-sizing: border-box;
                    padding: 15px;
                    border-radius: 10px;  
                    align-items: center;
                    border: var(--border-width) solid var(--legothon-greyborder);  
                }
                svg{
                   fill: var(--legothon-white);
                   stroke:  var(--legothon-white);
                }
            `;

            constructor() {
                super();
                this._played = false;
            }

            play(){
                if(this._played) return;
                const video = this.renderRoot.querySelector('video');
                const audio = this.renderRoot.querySelector('audio');
                if (video) {
                    video.play().catch(error => console.log("Video play failed:", error));
                }

                if (audio) {
                    audio.play().catch(error => console.log("Audio play failed:", error));
                }
                this._played=true;
            }
            
            render() {
                return html`
                <div>
                    <video id="video" src=${this.video} autoplay muted loop style="position: absolute; top: 0px; left: 0px; width: 1920px; height: 1080px; object-fit: cover; z-index: -2;">
                    <audio id="audio" src=${this.audio} loop></audio>
                </div>
                `;
            }
        }
        customElements.define('video-background-box', VideoBackgroundBox);

        class RunInfo extends LitElement {
            static properties = {
                game : {type: String},
                category: {type: String},
                platform: {type: String},
                estimate: {type: String},
                runners: {type: Array}
            };

            static styles = css`
                :host {
                    font-family: 'Bebas Neue', sans-serif;
                }
                
                .runInfoBox{
                    display: flex;
                    flex-direction: column;
                    justify-content: space-evenly;
                    color: var(--legothon-white);
                    box-sizing: border-box;
                    padding: 45px;
                    position: absolute;
                    left: 0px;
                    top: 265px;
                    width: 684px;
                    height: 565px;
                    z-index: 2;
                }
                .game{
                    font-size: 3.5em;
                    font-weight: bold;
                }
                .category{
                    font-size: 3em;
                    font-weight: bold;
                    color: #CFCFCF;
                }
                .otherInfo{
                    font-size: 2.4em;
                    font-weight: bold;
                    color: #CFCFCF;
                }
                .runner{
                    font-size: 2.9em;
                    font-weight: bold;
                    color: #CFCFCF;
                }
            `;

            constructor() {
                super();
            }
            
            render() {
                return html`
                    <div class="runInfoBox">
                        <div class="game">
                            ${this.game}
                        </div>
                        <div class="category">
                            ${this.category}
                        </div>
                        <div class="otherInfo">
                            ${this.platform} | EST: ${this.estimate}
                        </div>
                        <div class="runner">
                            ${this.runners.join(", ")}
                        </div>
                    </div>
                `;
            }
        }
        customElements.define('run-info', RunInfo);

        const this_host = "main";

        var state;

        const game_to_video = {
            "LEGO Star Wars: The Video Game": {video: "Legothon26-LSW1.mp4", audio: "lsw1.mp3"},
            "LEGO Star Wars: The Force Awakens": {video: "legothon_tfa.mp4", audio: "lswtcs.mp3"},
            "LEGO Dimensions": {video: "legothon_dinemsions.mp4", audio: "lswtcs.mp3"},
            "LEGO Batman: The Videogame": {video: "legothon_lb1.mp4", audio: "lswtcs.mp3"},
            "LEGO My Style: Preschool": {video: "legothon_mystyle.mp4", audio: "lswtcs.mp3"},
            "LEGO Rock Band": {video: "legothon_rockbandds.mp4", audio: "lswtcs.mp3"},
            "LEGO Batman: Legacy of the Dark Knight": {video: "legothon_lb4.mp4", audio: "lswtcs.mp3"},
            "LEGOLAND": {video: "Legothon26-LEGOLAND.mp4", audio: "legoland.mp3"},
            "LEGO Batman 3: Beyond Gotham": {video: "Legothon26-LB3.mp4", audio: "lb3.mp3"},
            "LEGO Star Wars: The Complete Saga": {video: "Legothon26-TCS.mp4", audio: "tcs.mp3"},
            "LEGO Indiana Jones: The Original Adventures": {video: "Legothon26-LIJ1.mp4", audio: "lij1.mp3"},
            "Bionicle: The Game": {video: "Legothon26-BIONICLE.mp4", audio: "bionicle.mp3"},
            "LEGO Voyagers": {video: "Legothon26-VOYAGERS.mp4", audio: "voyagers.mp3"},
            "LEGO Indiana Jones 2: The Adventure Continues": {video: "Legothon26-LIJ2.mp4", audio: "lij2.mp3"},
            "LEGO Builder's Journey": {video: "Legothon26-BUILDERSJOURNEY.mp4", audio: "lij2.mp3"},
            "LEGO Harry Potter: Years 1-4": {video: "Legothon26-LHP1-4.mp4", audio: "lhp1-4.mp3"},
        }

        connectToSocket('/ws', function(data) {
            state = data;
            var event_id = getEventForHost(data, this_host);
            if (event_id == null) {
                return;
            }

            var event = getEventById(data, event_id);

            console.log("Event for host " + this_host + ": ", event);

            var content = game_to_video[event.game];
            console.log("Content for game " + event.game + ": ", content);

            var videoBox = document.querySelector('video-background-box');
            videoBox.video = "./videos/" + content.video;
            videoBox.audio = "./audio/" + content.audio;

            var runInfo = document.querySelector('run-info');
            runInfo.game = event.game;
            runInfo.category = event.category;
            runInfo.platform = event.console;

            var estimate_sec = event.estimate % 60;
            var estimate_min = Math.floor(event.estimate / 60) % 60;
            var estimate_hr = Math.floor(event.estimate / 3600);
            runInfo.estimate = estimate_hr + ":" + (estimate_min < 10 ? "0" : "") + estimate_min + ":" + (estimate_sec < 10 ? "0" : "") + estimate_sec;
            
            var runners = getEventRunners(event).map(runner => data.people[runner].name);
            runInfo.runners = runners;
        });

        window.addEventListener('click', function(event) {
            document.querySelector('video-background-box').play();
        });
    </script>
</html>

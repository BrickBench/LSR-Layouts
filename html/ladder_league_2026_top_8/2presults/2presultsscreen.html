<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://fonts.cdnfonts.com/css/aurebesh" rel="stylesheet">

        <style>
            :root {
                --ladder-league-white: #cacacb;
                --ladder-league-shadow: #131524;
                --ladder-league-green: #6cc46c;
                --ladder-league-red: #e46a6a;
                --ladder-league-split-green: #95d895;
                --ladder-league-split-red: #e67b7b;
                --ladder-league-p1-color: #6cc46c;
                --ladder-league-p2-color: #00a2ff;
                --ladder-league-p3-color: #ffbc09;
                --ladder-league-bright-white: #dadadb;
                --ladder-league-grey: #A8A8A8;
                --ladder-league-blue: #1562D1;
                --ladder-league-gold: #FFC80B;
                --ladder-league-dark-blue: #1B243C;
                --ladder-league-teal: #193952;
                --ladder-league-darkgrey: #525251;
                --transition-offset: 3.1s;
            }
        </style>
    </head>
    <body style="width:1920px; height:1080px; background-image: url('LL26_MatchResults_Background.png'); margin: 0;">
        <match-results p1MainImage="./images/jared_Left.png" p2MainImage="./images/jared_Right.png" p1Name="Eroadhouse"></match-results>
    </body>
    <script type="module">
        import { LitElement, html, css } from 'https://esm.run/lit';
        import {connectToSocket, getEventForHost, toStringTime} from '../../../js/automarathon.js'
        import { gsap } from "https://esm.sh/gsap";

        connectToSocket('/ws?high_rate=true', function(data) {
            const countdownElement = document.querySelector('countdown-bug');

            let cf = data.custom_fields;
            //countdownElement.countdownEndtime = cf['countdown-end-time'] ? parseInt(cf['countdown-end-time']) : 0;

            /*var event_id = getEventForHost(data, this_host);
            if (event_id == null) {
                return;
            }*/
        });

        class MatchResults extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                }
                .match-3p-results-column {
                    display: flex;
                    flex-direction: column;
                    box-sizing: border-box;
                    align-items: center;
                    padding-top: 30px;
                    padding-left: 57px;
                    padding-right: 57px;
                    padding-bottom: 57px;
                    border-bottom-right-radius: 65px;
                    border-top-left-radius: 25px;
                    box-shadow: 4px 4px 10px #101010;
                }

                .results-runner-icon{
                    width: 127px;
                    height: 127px;
                }

                .results-runner-name{
                    text-shadow: 2px 2px 7px rgb(10, 10, 10); 
                    color: var(--ladder-league-white);
                    text-transform: uppercase;
                    text-align: center;
                    font-family: "Rubik";
                    font-size: 42px;
                    font-weight: bold;
                    text-align: center;
                    padding-top: 10px;
                }
                .results-placement{ 
                    text-shadow: 2px 2px 7px rgb(10, 10, 10); 
                    color: var(--ladder-league-white);
                    text-align: center;
                    font-family: "Rubik";
                    text-align: center;
                    font-style: italic;
                    font-size: 33px;
                    padding-bottom: 25px;
                }

                .results-time-row{
                    display: flex;
                    flex-direction: row;
                    text-shadow: 2px 2px 7px rgb(10, 10, 10); 
                    color: var(--ladder-league-white);
                    font-family: "Rubik";
                    font-weight: bold;
                    font-size: 43px;
                    width: 100%;
                    padding-top: 6px;
                }

                .results-episode-label{
                    text-align: left;
                    flex: 1;
                }

                .results-episode-time{
                    text-align: center;
                    font-variant-numeric: tabular-nums; 
                    flex: 1;
                }

                .results-final-time-label
                {
                    text-shadow: 4px 4px 7px rgb(10, 10, 10); 
                    font-family: "Rubik";
                    color: var(--ladder-league-blue);
                    font-weight: bold;
                    font-size: 47px;
                    padding-top: 22px;
                    text-align: center;
                }
                .results-final-time{
                    text-shadow: 4px 4px 7px rgb(10, 10, 10); 
                    color: var(--ladder-league-white);
                    font-variant-numeric: tabular-nums; 
                    text-transform: uppercase;
                    text-align: center;
                    font-family: "Rubik";
                    font-size: 67px;
                    font-weight: bold;
                    text-align: center;
                }

                .match-3p-results-header{
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    align-content: center;
                    box-sizing: border-box;
                    padding-top: 10px;
                    padding-bottom: 10px;
                    justify-content: center;
                }
                .match-3p-results-header-name{
                    text-shadow: 2px 2px 7px rgb(10, 10, 10); 
                    color: var(--ladder-league-white);
                    text-transform: uppercase;
                    text-align: center;
                    font-family: "Rubik";
                    font-weight: bold;
                    font-size: 75px;
                }
                .match-3p-results-header-caption{
                    font-family: "Aurebesh";
                    color: var(--ladder-league-grey);
                    text-shadow: 2px 2px 7px rgb(10, 10, 10); 
                    font-size: 37px;
                }
                .hrule{
                    width: 100%;
                    padding-top:4px;
                    border-radius: 10px;
                    opacity: 80%;
                    background-color: var(--ladder-league-darkgrey);
                    filter: blur(2px);
                }
                
                .runner-profile-column{
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    padding-bottom: 100px;
                }

                .runner-profile-status{
                    font-family: "Rubik";
                    font-size: 2.6em;
                    font-style: italic;
                }

                .runner-profile-status.win{
                    color: var(--ladder-league-green);
                }

                .runner-profile-status.lose{
                    color: var(--ladder-league-red);
                }

                .runner-profile-name{
                    color: var(--ladder-league-white);
                    font-family: "Rubik";
                    font-weight: bold;
                    font-size: 2.6em;
                    text-transform: uppercase;
                }

                .name-column{
                    width:360px;
                    text-align: center;
                    align-items: center;
                    margin-top: -10px;
                    text-shadow: 4px 4px 4px #202020;
                }

                .splits-name{
                    text-transform: uppercase;
                    font-style: italic;
                    color: var(--ladder-league-white);
                    font-size: 2.2em;
                    font-weight: bold;
                }

                .portrait{
                    width: 460px;
                    margin-bottom: -20px;
                    z-index: -1;
                    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
                }
            `;

            static properties = {
                eventName: { type: String },
                finalTimes: {type: Array},
                splits: { type: Array },
                p1Name: {type: String},
                p2Name: {type: String},
                p1Icon: {type: String},
                p2Icon: {type: String},
                p1Img: {type: String},
                p2Img: {type: String},
                p1MainImage: {type: String},
                p2MainImage: {type: String}
            };

            constructor() {
                super();
            }

            render() {

                let p1Display = [];
                let p2Display = [];

                if (this.splits != null) {
                    for(var i = 5; i < 36; i += 6){
                        if (i >= this.splits.length) {
                            break;
                        }

                        var split = this.splits[i];
                        if(!split[0]){
                            p1Display.push("-");
                        }else{
                            p1Display.push(toStringTime(split[0]));
                        }
                        if(!split[1]){
                            p2Display.push("-");
                        }else{
                            p2Display.push(toStringTime(split[1]));
                        }
                    }
                }

                var placementP1;
                var placementP2;

                var p1Tokens;
                var p2Tokens;
                var displayTimeP1;
                var displayTimeP2;

                
                if(this.finalTimes && this.finalTimes[0]){
                    p1Tokens = this.finalTimes[0].split(".");
                    displayTimeP1 = p1Tokens[0].trim();
                }
                
                if(this.finalTimes && this.finalTimes[1]){
                    p2Tokens = this.finalTimes[1].split(".");
                    displayTimeP2 = p2Tokens[0].trim();
                }

                this.finalTimes[1] = "2:43:32";
                 if(this.finalTimes && this.finalTimes[0] && this.finalTimes[1]){
                    if(displayTimeP2.toLowerCase().includes("dnf")){
                        placementP1 = "1st";
                        placementP2 = "2nd";
                    }else if(displayTimeP1.toLowerCase().includes("dnf")){
                        placementP1 = "2nd";
                        placementP2 = "1st"
                    }else{
                        if(p1Tokens.length == 1){
                            p1Tokens.push("000");
                        }
                        if(p2Tokens.length == 1){
                            p2Tokens.push("000");
                        }

                        if((p1Tokens[0]+"."+p1Tokens[1]) < (p2Tokens[0]+"."+p2Tokens[1])){
                            placementP1 = "1st";
                            placementP2 = "2nd";
                        }else{
                            placementP1 = "2nd";
                            placementP2 = "1st"
                        }
                    }
                }

                var leftMargin = 0;
                var rightMargin = 0;

                console.log(placementP1, placementP2, this.finalTimes)

                if(this.p1MainImage.endsWith("Anorak_Left.png")){
                    leftMargin = 130;
                }

                return html`
                    <div class="match-3p-results-header" style="position: absolute; width: 1920px; height: 258px; top: 0px; left: 0px">
                        <div class="match-3p-results-header-name">
                            ${this.eventName} Summary
                        </div>
                        <div class="match-3p-results-header-caption">
                            Match Results
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 80px; margin-top: 100px; margin-left: -3px; width: 1920px; height: 1080px;">
                    
                    <div class="runner-profile-column name-column">
                        <img class="portrait" src="${this.p1MainImage}" style="margin-left: ${leftMargin}px;"/>
                        <div class="runner-profile-name">
                            ${this.p1Name}
                        </div>
                        <div class="runner-profile-status ${(this.splits && placementP1 == "1st") ? "win": "lose"}">
                            ${(this.splits && placementP1 == "1st") ? "Winner": "Loser"}
                        </div>
                    </div>
                    
                        <!-- Runner 1 -->
                    <div class="match-3p-results-column" style="width: 409px; height: 672px; background-image: url('Box_Left.png');">
                        <img id="runner-1-icon" class="results-runner-icon" src="${this.p1Icon}"/>
                        <div class="splits-name">Split Times</div>
                        <hr class="hrule">
                        <div class="results-time-row">
                            <div class="results-episode-label">I</div>
                            <div id="result-1-ep-1" class="results-episode-time">${p1Display[0]}</div>
                        </div>
                        <div class="results-time-row">
                            <div class="results-episode-label">II</div>
                            <div id="result-1-ep-2" class="results-episode-time">${p1Display[1]}</div>
                        </div>
                        <div class="results-time-row">
                            <div class="results-episode-label">IV</div>
                            <div id="result-1-ep-4" class="results-episode-time">${p1Display[2]}</div>
                        </div>
                        <div class="results-time-row">
                            <div class="results-episode-label">VI</div>
                            <div id="result-1-ep-6" class="results-episode-time">${p1Display[3]}</div>
                        </div>
                        <div class="results-time-row">
                            <div class="results-episode-label">III</div>
                            <div id="result-1-ep-3" class="results-episode-time">${p1Display[4]}</div>
                        </div>
                        <div class="results-final-time-label">
                            FINAL TIME
                        </div>
                        <div id="result-1-ep-5" class="results-final-time">
                            ${displayTimeP1 ?? "-"}
                        </div>
                    </div>

                    <!-- Runner 2 -->
                    <div class="match-3p-results-column" style="width: 409px; height: 672px; background-image: url('Box_Right.png');">
                        <img id="runner-2-icon" class="results-runner-icon" src="${this.p2Icon}"/>
                        <div class="splits-name">Split Times</div>
                        <hr class="hrule">
                        <div class="results-time-row">
                            <div class="results-episode-label">I</div>
                            <div id="result-2-ep-1" class="results-episode-time">${p2Display[0]}</div>
                        </div>
                        <div class="results-time-row">
                            <div class="results-episode-label">II</div>
                            <div id="result-2-ep-2" class="results-episode-time">${p2Display[1]}</div>
                        </div>
                        <div class="results-time-row">
                            <div class="results-episode-label">IV</div>
                            <div id="result-2-ep-4" class="results-episode-time">${p2Display[2]}</div>
                        </div>
                        <div class="results-time-row">
                            <div class="results-episode-label">VI</div>
                            <div id="result-2-ep-6" class="results-episode-time">${p2Display[3]}</div>
                        </div>
                        <div class="results-time-row">
                            <div class="results-episode-label">III</div>
                            <div id="result-2-ep-3" class="results-episode-time">${p2Display[4]}</div>
                        </div>
                        <div class="results-final-time-label">
                            FINAL TIME
                        </div>
                        <div id="result-2-ep-5" class="results-final-time">
                            ${displayTimeP2 ?? "-"}
                        </div>
                    </div>

                    <div class="runner-profile-column name-column">
                        <img class="portrait"  src="${this.p2MainImage}"/>
                        <div class="runner-profile-name">
                            ${this.p2Name}
                        </div>
                        <div class="runner-profile-status ${(this.splits && placementP2 == "1st") ? "win": "lose"}">
                            ${(this.splits && placementP2 == "1st") ? "Winner": "Loser"}
                        </div>
                    </div>

                    </div>

                `;
            }
        }

        customElements.define('match-results', MatchResults);
    </script>
    <script type="module" src="../../../js/ladder_league_2026_top8.js"></script>
</html>

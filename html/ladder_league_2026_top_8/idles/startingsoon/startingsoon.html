<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
        <style>
            :root {
                --ladder-league-white: #cacacb;
                --ladder-league-shadow: #131524;
                --ladder-league-green: #6cc46c;
                --ladder-league-red: #e46a6a;
                --ladder-league-split-green: #95d895;
                --ladder-league-split-red: #e67b7b;
                --ladder-league-p1-color: #6cc46c;
                --ladder-league-p2-color: #00a2ff;
                --ladder-league-p3-color: #ffbc09;
                --ladder-league-bright-white: #dadadb;
                --ladder-league-grey: #A8A8A8;
                --ladder-league-blue: #1562D1;
                --ladder-league-gold: #FFC80B;
                --ladder-league-dark-blue: #1B243C;
                --ladder-league-teal: #193952;
                --transition-offset: 3.1s;
            }
            .slide{
                position: absolute;
                top: 0px;
                left: 0px;
                width: 1920px;
                height: 1080px;
                mix-blend-mode: plus-lighter;
            }
            .slide.incoming{
                mix-blend-mode: plus-lighter;
            }
            .countdown{
                position: absolute;
                top: 405px;
                left: 184px;
                width: 184px;
                height: 77px;
                line-height: 77px;
                color: var(--ladder-league-gold);
                font-family: 'Rubik';
                font-size: 59px;
                font-variant-numeric: tabular-nums;
                font-weight: bold;
                text-align: center; 
                z-index: 2;
            }
        </style>
    </head>
    <body style="background-color: black;">
        <div class="countdown">
            23:23
        </div>
        <div id="slides">
            <div class="slide" style="background-image: url('images/Startingsoon_1.png');"></div>
            <div class="slide" style="background-image: url('images/Startingsoon_2.png');"></div>
            <div class="slide" style="background-image: url('images/Startingsoon_3.png');"></div>
            <div class="slide" style="background-image: url('images/Startingsoon_4.png');"></div>
            <div class="slide" style="background-image: url('images/Startingsoon_5.png');"></div>
            <div class="slide" style="background-image: url('images/Startingsoon_6.png');"></div>
        </div>
    </body>
    <script>
        document.addEventListener("DOMContentLoaded", (event) => {
            const slides = gsap.utils.toArray(".slide");

            const duration = 2; 
            const hold = 5;

            const tl = gsap.timeline({ repeat: -1 });

            for(var i=0;i<slides.length;i++){
                gsap.set(slides[i], { autoAlpha: 0 });
            }

            gsap.set(slides[0], { autoAlpha: 1 });

            slides.forEach((slide, i) => {
                const nextSlide = slides[(i+ 1) % slides.length];
  
                tl.to(slide, { autoAlpha: 0, duration: duration }, `+=${hold}`)
                    .to(nextSlide, { autoAlpha: 1, duration: duration }, `-=${duration}`);    
            });
        });
    </script>
    <script type="module" defer>
        import {connectToSocket, getEventForHost, toStringTime, getEventTimerValue, getEventById} from '../../../../js/automarathon.js'

        const this_host = "main";
        const testStartTime = new Date().getTime();

        var state;

        connectToSocket('/ws?high_rate=true', function(data) {
            state = data;
        });
        
        setInterval(function() {
            if (state == null) {
                return;
            }

            let cf = state.custom_fields;
            let timer = cf['countdown-end-time'] ? parseInt(cf['countdown-end-time']) : undefined;
            
            timer = testStartTime + 30000;
            
            let time = timer ? timer - Date.now() : undefined;
            var timer_element = document.getElementsByClassName("countdown")[0];
            
           if(time >= 3600000 || time < 0){
                timer_element.innerHTML = "TOP 8";
           }else if (time <= 0){
                timer_element.innerHTML = "00:00";
           }else{
                timer_element.innerHTML = toStringTime(time, false, true);
           }
        }, 100)
    </script>
</html>

<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
        <style>
            :root {
                --ladder-league-white: #cacacb;
                --ladder-league-shadow: #131524;
                --ladder-league-green: #6cc46c;
                --ladder-league-red: #e46a6a;
                --ladder-league-split-green: #95d895;
                --ladder-league-split-red: #e67b7b;
                --ladder-league-p1-color: #6cc46c;
                --ladder-league-p2-color: #00a2ff;
                --ladder-league-p3-color: #ffbc09;
                --ladder-league-bright-white: #dadadb;
                --ladder-league-grey: #A8A8A8;
                --ladder-league-blue: #1562D1;
                --ladder-league-gold: #FFC80B;
                --ladder-league-dark-blue: #1B243C;
                --ladder-league-teal: #193952;
                --transition-offset: 3.1s;
            }
        </style>
    </head>
    <script>
        document.addEventListener("DOMContentLoaded", (event) => {
            const splitsTable = document.querySelector('splits-table');
            const winProbs = document.querySelector('win-prob');

            //Set initial alphas
            gsap.set(splitsTable, { autoAlpha: 1 });
            gsap.set(winProbs, { autoAlpha: 0 });
        });
    </script>
    <script type="module" defer>
        import { LitElement, html, css, nothing } from 'https://esm.run/lit';
        import {classMap} from 'https://esm.run/lit/directives/class-map.js';
        import {connectToSocket, getEventForHost, toStringTime, compareTime} from '../../../js/automarathon.js'

        class RunnerPlate extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                    text-transform: uppercase;
                }
                .name-container {
                    position: absolute;
                    width: 461px; 
                    height: 87px;
                    display: flex;
                    flex-direction: row;
                    align-items: center;
                    box-sizing: border-box;
                    padding: 10px;
                    gap: 10px;
                }
                .runner-name {
                    color: var(--ladder-league-white);
                    font-size: 2.6em;
                    font-weight: bold;
                }
                .flag-scale {
                    font-size: 2.4em;
                }
            `;

            static properties = {
                top: { type: Number },
                left: { type: Number },
                name: { type: String },
                flag: { type: String},
                flip: {type: Boolean}
            };

            constructor() {
                super();
                this.flag="us";
                this.name="dragon";
            }
            render() {
                return html`
                    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
                    <div class="name-container" style="top: ${this.top}px; left: ${this.left}px; justify-content: center;">
                         ${this.flip ? html`<span class="runner-name">${this.name}</span><span class="fi fi-${this.flag} flag-scale"></span>` : html`<span class="fi fi-${this.flag} flag-scale"></span>
                         <span class="runner-name">${this.name}</span>`}
                    </div>
                `;
            }
        }

        customElements.define('runner-plate', RunnerPlate);

        class CommentatorPlate extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                }
                .commentary-box {
                    font-family: 'Rubik';
                    color: var(--ladder-league-white);
                    box-sizing: border-box;
                    padding: 3%, 1%, 3%, 1%;
                    font-weight: bold;
                    text-align: center;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    gap: 0px;
                    text-shadow: 2px 2px 5px var(--ladder-league-shadow);
                }

                .commentator-name {
                    font-size: 25px;
                    color: var(--ladder-league-white);
                }
                .commentator-pronoun {
                    font-size: 13px;
                    color: var(--ladder-league-white);
                }
            `;

            static properties = {
                top: { type: Number },
                left: { type: Number },
                name: { type: String },
                pronoun: { type: String}
            };

            constructor() {
                super();
            }
            render() {
                return html`
                    <div class="commentary-box" style="position: absolute; left: ${this.left}px; top: ${this.top}px; width: 231px; height: 55px;">
                        <span class="commentator-name">${this.name}</span>
                        ${this.pronoun ?  html`<span class="commentator-pronoun">${this.pronoun}</span>` : nothing}
                    </div>
                `;
            }
        }
        customElements.define('commentator-plate', CommentatorPlate);

        class SplitsTable extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                }
                .splits-table{
                    display: flex;
                    flex-direction: column;
                    box-sizing: border-box;
                    gap: 11px;
                    padding: 15px;
                    text-shadow: 2px 2px 5px var(--ladder-league-shadow);
                }
                .splits-row{
                    display: flex;
                    flex-direction: row;
                    align-items: center;
                }
                .row-header{
                    width: 16%;
                    color: var(--ladder-league-white);
                    text-align: center;
                    font-weight: bold;
                    font-size: 2.1em;
                }
                .splits-entry{
                    width: 42%;
                    color: var(--ladder-league-white);
                    text-align: center;
                    font-size: 2.27em;
                    font-variant-numeric: tabular-nums;
                }

                .splits-entry.ahead{
                    color: var(--ladder-league-split-green);
                }

                .splits-entry.behind{
                    color: var(--ladder-league-split-red);
                }

                .bpt-entry{
                    width: 42%;
                    color: var(--ladder-league-white);
                    text-align: center;
                    font-weight: bold;
                    font-size: 2.1em;
                    font-variant-numeric: tabular-nums;
                }
            `;

            static properties = {
                top: { type: Number },
                left: { type: Number },
                splitIndex: {type: Number},
                splits: { type: Array},
                bpts: { type: Array }, 
            };

            constructor() {
                super();
                this.splitIndex = 2;
                this.splits = [
                    [40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],
                    [40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],
                    [40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],
                    [40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],
                    [40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],
                    [40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],[40000,34000],
                ];
                this.bpts = [
                    40000,40000
                ];
            }

            _getSplitName(split) {
                if (split >= 36) {
                    return null;
                }
                const level = (split % 6) + 1;
                const episode_idx = Math.floor(split / 6);
                const episode_names = [
                    1, 2, 4, 6, 3, 5
                ];

                return episode_names[episode_idx] + "-" + level;
            }

            render() {

                let cleanSplitIndex = Math.min(Math.max(this.splitIndex, 0), Math.min(32,this.splits.length));

                return html`
                    <div class="splits-table" style="position: absolute; left: ${this.left}px; top: ${this.top}px; width: 771px; height: 236px;">
                        ${this.splits.slice(cleanSplitIndex, cleanSplitIndex + 3).map((entry, index) => {  return html`
                             <div class="splits-row">
                                <div class="splits-entry ${entry[0] ? (entry[0] <= entry[1] || entry[1] == null ? "ahead" : "behind") : ""}">
                                    ${entry[0] ? toStringTime(entry[0], false, true, false) : "--:--"}
                                </div>
                                <div class="row-header">
                                    ${this._getSplitName(cleanSplitIndex + index)}
                                </div>
                                <div class="splits-entry ${entry[1] ? (entry[1] <= entry[0] || entry[0] == null ? "ahead" : "behind") : ""}">
                                    ${entry[1] ? toStringTime(entry[1], false, true, false) : "--:--"}
                                </div>
                            </div
                        `})}
                        <div class="splits-row">
                            <div class="bpt-entry">
                                ${!(!this.bpts || !this.bpts[0]) ? toStringTime(this.bpts[0], false, true, false) : "--:--:--"}
                            </div>
                            <div class="row-header">BPT</div>
                            <div class="bpt-entry">
                                ${!(!this.bpts || !this.bpts[1]) ? toStringTime(this.bpts[1], false, true, false) : "--:--:--"}
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        customElements.define('splits-table', SplitsTable);

        class TitleBar extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                }
                .timer-title-box{
                    display: flex;
                    flex-direction: row;
                    font-family: 'Rubik';
                    font-weight: bold;
                    box-sizing: border-box;
                    padding-top: 5px;
                    padding-bottom: 5px;
                    padding-left: 27px;
                    padding-right: 24px;
                    color: var(--ladder-league-white);
                    text-shadow: 2px 2px 5px var(--ladder-league-shadow);
                }

                .match-title-box{
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    text-align: center;
                    text-transform: uppercase;
                    font-size: 30px;
                    gap: 1px;
                    flex: 1;
                    margin-left: -26px;
                }

                .timer{
                    text-align: right;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    font-size: 52px;
                    flex: 1;
                    font-variant-numeric: tabular-nums; 
                }

                .time-title-spacer{
                    flex: 1;
                }
            `;

            static properties = {
                top: { type: Number },
                left: { type: Number },
                matchTitle: { type: String },
                timer: {type: Number}
            };

            constructor() {
                super();
                this.timer = 10000000;
            }
            render() {
                var matchElements;
                
                if(!this.matchTitle){
                     matchElements = html`<div>TOP 8</div><div>ELIMS</div>`;
                }else if(this.matchTitle.toLowerCase().includes("quarter") || this.matchTitle.toLowerCase().includes("semi"))
                {
                    matchElements = html`<div>TOP 8</div><div>${this.matchTitle}</div>`;
                }else if(this.matchTitle.toLowerCase().includes("grand"))
                {
                    matchElements = html`<div>GRAND</div><div>FINALS</div>`;
                }else{
                    matchElements = html`<div>${this.matchTitle}</div>`;
                }

                return html`
                   <div class="timer-title-box" style="position: absolute; left: ${this.left}px; top: ${this.top}px; width: 771px; height: 100px;">
                        <div class="time-title-spacer"></div>
                        <div id="match-title-split" class="match-title-box">
                            ${matchElements}
                        </div>
                        <div class="timer">${toStringTime(this.timer, false, true, false)}</div>
                    </div>
                `;
            }
        }
        customElements.define('title-bar', TitleBar);

        class WinProb extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                }
                
                .win-prob-2p{
                    display: flex;
                    flex-direction: column;
                    gap: 10px;
                    font-family: 'Rubik';
                    color: var(--ladder-league-white);
                    box-sizing: border-box;
                    padding-top: 25px;
                    padding-bottom: 25px;
                    padding-left: 25px;
                    padding-right: 25px;
                    text-shadow: 2px 2px 5px var(--ladder-league-shadow);
                }

                .win-prob-title{
                    text-align: center;
                    height: 18%;
                    font-size: 1.8em;
                    font-weight: bold;
                }

                .bars-container{
                    display: flex;
                    flex-direction: column;
                    align-content: space-evenly;
                    height: 82%;
                }

                .bar-container{
                    display: flex;
                    flex-direction: row;
                    flex: 1;
                    align-items: center;
                    gap: 2%;
                }

                .win-prob-bar {
                    background-color: var(--bar-color);
                    height: 40%;
                }

                .bar-name{
                    width: 24%;
                    font-weight: bold;
                    font-size: 1.3em;
                }

                .bar-percentage{
                    width: 5%;
                    font-size: 1.3em;
                }
            `; 

            static properties = {
                top: { type: Number },
                left: { type: Number },
                names: { type: Array },
                probs: { type: Array},
                prevProbs: {type: Array}
            };

            animateBar(){
                const BAR_MAX_PERCENT = 50;
            
                const p1CE = this.renderRoot.querySelector("#bar-percent-1");
                const p1CB = this.renderRoot.querySelector("#bar-display-1");
                const p1CO = { val: this.prevProbs[0] };
                
                gsap.to(p1CO, {
                    val: this.probs[0],
                    duration: 3,
                    ease: "power1.inOut",
                    snap: { val: 0.1 }, 
                    onUpdate: () => {
                        p1CE.innerText = Math.round(p1CO.val) + "%";

                        const percent = p1CO.val * BAR_MAX_PERCENT / 100;
                        p1CB.style.width = percent + "%";
                        this.prevProbs[0] = p1CO.val;
                    }
                });

                const p2CE = this.renderRoot.querySelector("#bar-percent-2");
                const p2CB = this.renderRoot.querySelector("#bar-display-2");
                const p2CO = { val: this.prevProbs[1] };
                
                gsap.to(p2CO, {
                    val: this.probs[1],
                    duration: 3, 
                    ease: "power1.inOut",
                    snap: { val: 0.1 }, 
                    onUpdate: () => {
                        p2CE.innerText = Math.round(p2CO.val) + "%";
                        
                        const percent = p2CO.val * BAR_MAX_PERCENT / 100;
                        p2CB.style.width = percent + "%";
                        this.prevProbs[1] = p2CO.val;
                    }
                });
            }

            constructor() {
                super();
                this.probs = [50, 50];
                this.prevProbs = [50, 50];
            }
            render() {
                return html`
                     <div id="win-prob-2p" class="win-prob-2p" style="position: absolute; left: ${this.left}px; top: ${this.top}px; width: 771px; height: 236px;">
                        <div class="win-prob-title">
                            LIVE WIN PREDICTION
                        </div>
                        <div class="bars-container">
                            <div class="bar-container">
                                <div class="bar-name">
                                    ${this.names && this.names[0]}
                                </div>
                                <div id="bar-display-1" class="win-prob-bar" style="--bar-color: var(--ladder-league-p1-color); width: 50%;"></div>
                                <div id="bar-percent-1" class="bar-percentage">
                                    0%
                                </div>
                            </div>
                            <div class="bar-container">
                                <div id="bar-name-2" class="bar-name">
                                    ${this.names && this.names[1]}
                                </div>
                                <div id="bar-display-2" class="win-prob-bar" style="--bar-color: var(--ladder-league-p2-color); width: 50%;"></div>
                                <div id="bar-percent-2" class="bar-percentage">
                                    0%
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        customElements.define('win-prob', WinProb);

        class WinnerOverlays extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                }
                .runner-overlay{
                    text-align: center;
                    text-shadow: 2px 2px 7px rgb(30, 30, 30); 
                    color: var(--ladder-league-bright-white);
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    background-color: rgba(0,0,0,0.7);
                    visibility: hidden;
                    opacity: 0;
                    font-family: 'Rubik';
                    box-sizing: border-box;
                    padding-top: 30px;
                    transition: opacity 300ms ease-in, visibility 0ms ease-in 300ms;
                }

                .runner-overlay-time{
                    font-weight: bold;
                    font-size: 94px;
                }

                .runner-overlay-placement{
                    font-style: italic;
                    font-size: 50px;
                    opacity: 0;
                    transition: opacity 300ms ease-in 0ms, visibility 0ms ease-in 0ms;
                    display: flex;
                    flex-direction: row;
                    align-items: center;
                    justify-content: center;
                    gap: 12px;
                }

                .runner-overlay-placement.show{
                    opacity: 1;
                } 
                .runner-overlay-show {
                    visibility: visible;
                    opacity: 1;
                    transition-delay: 0ms;
                }
            `; 

            static properties = {
                p1Time: { type: String },
                p2Time: { type: String }
            };

            constructor() {
                super();
            }
            render() {
                var placementP1;
                var placementP2;

                var p1Tokens;
                var p2Tokens;
                var displayTimeP1;
                var displayTimeP2;

                
                if(this.p1Time){
                    p1Tokens = this.p1Time.split(".");
                    displayTimeP1 = p1Tokens[0].trim();
                }
                
                if(this.p2Time){
                    p2Tokens = this.p2Time.split(".");
                    displayTimeP2 = p2Tokens[0].trim();
                }
                

                if(this.p1Time && this.p2Time){
                    if(displayTimeP2.toLowerCase().includes("dnf")){
                        placementP1 = "1st";
                        placementP2 = "2nd";
                    }else if(displayTimeP1.toLowerCase().includes("dnf")){
                        placementP1 = "2nd";
                        placementP2 = "1st"
                    }else{
                        if(p1Tokens.length == 1){
                            p1Tokens.push("000");
                        }
                        if(p2Tokens.length == 1){
                            p2Tokens.push("000");
                        }

                        if((p1Tokens[0]+"."+p1Tokens[1]) < (p2Tokens[0]+"."+p2Tokens[1])){
                            placementP1 = "1st";
                            placementP2 = "2nd";
                        }else{
                            placementP1 = "2nd";
                            placementP2 = "1st"
                        }
                    }
                }

                return html`
                    <div class=${classMap({"runner-overlay": true, "runner-overlay-show": this.p1Time})} style="position:absolute; left: 30px; top: 60px; width:922px;height:512px;">
                        <div class="runner-overlay-time">${displayTimeP1}</div>
                        <div class=${classMap({"runner-overlay-placement": true, "win": placementP1 == "1st", "show": placementP1})}><img src="LL26_Flag.png" width="56"> <span>${placementP1} Place</span></div>
                    </div>
                    <div class=${classMap({"runner-overlay": true, "runner-overlay-show": this.p2Time})} style="position:absolute; left: 968px; top: 60px; width:921px;height:512px;">
                        <div class="runner-overlay-time">${displayTimeP2}</div>
                        <div class=${classMap({"runner-overlay-placement": true, "win": placementP2 == "1st", "show": placementP2})}><img src="LL26_Flag.png" width="56"> <span>${placementP2} Place</span></div>
                    </div>
                `;
            }
        }
        customElements.define('win-overlay', WinnerOverlays);
    </script>
    <body style="width:1920px; height:1080px; background-image: url('LL26_Top8_2P_V6.png');">
        <title-bar id="title-bar" left="577" top="606" matchTitle="quarterfinals"></title-bar>
        <runner-plate id="runner-1" left=30 top=572 name="flaminglazer" flag="ca"></runner-plate>
        <runner-plate id="runner-2" left=1428 top=572 name="eroadhouse" flag="us" flip="true"></runner-plate>
        <commentator-plate id="comm-1" name="LaserTrap" pronoun="They/Them" top="977" left="622"></commentator-plate>
        <commentator-plate id="comm-2" name="P53" top="977" left="1056"></commentator-plate>
        <splits-table id="splits" top="735" left="577"></splits-table>
        <win-prob id="prob" top="735" left="577"></win-prob>
        <win-overlay id="win-overlay"></win-overlay>
    </body>
    <script type="module" src="../../../js/ladder_league_2026_top8.js"></script>
</html>

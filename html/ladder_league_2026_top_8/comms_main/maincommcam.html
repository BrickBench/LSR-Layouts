<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <style>
            :root {
                --ladder-league-white: #cacacb;
                --ladder-league-shadow: #131524;
                --ladder-league-green: #6cc46c;
                --ladder-league-red: #e46a6a;
                --ladder-league-split-green: #95d895;
                --ladder-league-split-red: #e67b7b;
                --ladder-league-p1-color: #6cc46c;
                --ladder-league-p2-color: #00a2ff;
                --ladder-league-p3-color: #ffbc09;
                --ladder-league-bright-white: #dadadb;
                --ladder-league-grey: #A8A8A8;
                --ladder-league-blue: #1562D1;
                --ladder-league-gold: #FFC80B;
                --ladder-league-dark-blue: #1B243C;
                --ladder-league-dark-blue2: #101625;
                --ladder-league-teal: #193952;
                --transition-offset: 3.1s;
            }
            .low-thirds{
            }
        </style>
    </head>

    <script>
        // use a script tag or an external JS file
        document.addEventListener("DOMContentLoaded", (event) => {
            var lowerThirds = document.getElementById("low-thirds");
            var comms = document.getElementById("comms");
            setTimeout(() => {
                lowerThirds.reveal();
                //comms.names=["ERoadhouse","Jared", "Dragon"];
                //comms.reveal();
                setTimeout(() => {
                    lowerThirds.hide();
                    //comms.hide();
                }, 5000);
            }, 1000); 
        });
    </script>

    <script type="module" defer>
        import { LitElement, html, css, nothing } from 'https://esm.run/lit';
        import { gsap } from "https://esm.sh/gsap";

        class LowerThirds2 extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                }
            `;

            static properties = {
                top: { type: Number },
                left: { type: Number },
                name: { type: String },
            };

            constructor() {
                super();
            }
            render() {
                return html`
                    <div style="display: flex; flex-direction: column; width: 600px;">
                        ${this.name}
                    </div>
                `;
            }
        }

        const LOWER_THIRDS_RADIUS = 120;
        const LOWER_THIRDS_RADIUS_PADDING = 20; 

        class LowerThirds extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                    padding: 10px;
                }

                .main-box{
                    display: flex;
                    flex-direction: column;
                }

                .main-box::before{
                    content: "";
                    background-image: url("../noise.svg");
                    filter: contrast(470%) brightness(50%);
                    opacity: 0.05;
                    zIndex: -1;
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                }

                .lower-thirds{
                    display: flex;
                    flex-direction: column;
                }
                .lower-thirds-header{
                    background-color: var(--ladder-league-white);
                    align-self: flex-start; 
                    font-size: 2em;
                    text-transform: uppercase;
                    padding: 10px;
                    padding-right: 30px;
                    border-top-right-radius: 40px;
                    border-top-left-radius: 40px;
                    box-sizing: border-box;
                    font-weight: bold;
                    color: var(--ladder-league-dark-blue);
                    box-shadow: inset 0px 0px 16px rgba(0, 0, 0, 0.4);
                }
                .main-box{
                    background-color: var(--ladder-league-dark-blue);
                    display: flex;
                    flex-direction: column;
                    color: var(--ladder-league-white);
                    border-bottom-right-radius: 40px;
                    border-bottom-left-radius: 40px;
                    justify-content: space-evenly;
                    box-shadow: var(--ladder-league-dark-blue2) 0px 0px 16px inset;
                    box-shadow: rgba(0,0,0,0.3) 4px 4px 4px;
                    border: 3px solid var(--ladder-league-white);
                }
                .main-box-header{
                    font-size: 3em;
                    font-weight: bold;
                }
                .main-box-content{
                    font-size: 2.4em;
                }
                .lower-thirds-side{
                    height: ${LOWER_THIRDS_RADIUS * 2}px;
                    width: ${LOWER_THIRDS_RADIUS * 2}px;
                    border-radius: ${LOWER_THIRDS_RADIUS}px;
                    background-color: var(--ladder-league-dark-blue);
                    box-shadow: var(--ladder-league-dark-blue2) 0px 0px 16px inset;
                    border: 5px solid var(--ladder-league-white);
                    z-index: 2;
                    margin-top: ${LOWER_THIRDS_RADIUS * 0.10}px;
                }
                .reveal-element{
                    clip-path: polygon(0% 0%, 0% 0%, 0% 100%, 0% 100%);
                }
            `;

            static properties = {
                top: { type: Number },
                left: { type: Number },
                name: { type: String },
                width: {type: Number},
                contentBoxHeight: {type: Number},
                lowerThirdsHeader: {type: String},
                image: {type: String},
                headerText: {type: String},
                mainText: {type: String}
            };

            reveal(){
                const box = this.renderRoot?.querySelector('.reveal-element');
                gsap.fromTo(box, 
                { 
                    clipPath: "polygon(0% 0%, 0% 0%, 0% 100%, 0% 100%)" 
                }, 
                { 
                    clipPath: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)",
                    duration: 0.5,
                    ease: "power2.inOut"
                }
                );
            }

            hide(){
                const box = this.renderRoot?.querySelector('.reveal-element');
                gsap.fromTo(box, 
                { 
                    clipPath: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)" 
                }, 
                { 
                    clipPath: "polygon(0% 0%, 0% 0%, 0% 100%, 0% 100%)",
                    duration: 0.5,
                    ease: "power2.inOut"
                }
                );
            }

            constructor() {
                super();
            }
            render() {
                return html`
                    <div class="reveal-element" style="display: flex; flex-direction: row; width: 1920px; justify-content: center; align-items: center; position: absolute; top: ${this.top}px; margin-left: -10px;">
                        ${this.image && html`<div class="lower-thirds-side">
                        </div>`}
                        <div class="lower-thirds" style="width: ${this.width}px; margin-left: -${this.image ? LOWER_THIRDS_RADIUS : 0}px; overflow:visible;">
                            <div class="lower-thirds-header" style="padding-left: ${this.image ? LOWER_THIRDS_RADIUS+LOWER_THIRDS_RADIUS_PADDING : 40}px;">
                                ${this.lowerThirdsHeader}
                            </div>
                            <div class="main-box" style="height: ${this.contentBoxHeight}px; padding-left: ${this.image ? LOWER_THIRDS_RADIUS+LOWER_THIRDS_RADIUS_PADDING : 40}px; overflow:visible;">
                                <div class="main-box-header">
                                ${this.headerText}
                                </div>
                                <div class="main-box-content">
                                ${this.mainText}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        customElements.define('lower-thirds', LowerThirds);

        class CommentatorNames extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                }
                .commentator-row{
                    display: flex; 
                    flex-direction: row; 
                    align-items: center;
                    justify-content: space-evenly;
                }
                .commentator-entry{
                    color: white;
                    background-color: var(--ladder-league-dark-blue);
                    font-size: 4em;
                    width: 500px;
                    border-bottom-right-radius: 25px;
                    border-top-left-radius: 25px;
                    text-align: center;
                    display: flex;
                    flex-direction: row;
                    justify-content: center;
                    align-items: center;
                    gap: 10px;
                    border: 5px solid var(--ladder-league-white);
                    box-shadow: 10px 10px 30px rgba(0,0,0,0.6);
                    position: relative;
                }

                .commentator-entry::before{
                    content: "";
                    background-image: url("../noise.svg");
                    filter: contrast(470%) brightness(40%);
                    opacity: 0.15;
                    zIndex: -1;
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    border-bottom-right-radius: 25px;
                    border-top-left-radius: 25px;
                }

                .reveal-element{
                    opacity: 0;
                    visibility: hidden;
                }
            `;

            static properties = {
                top: { type: Number },
                height: {type: Number },
                names: { type: Array },
                enable: { type: Boolean }
            };

            reveal(){
                const box = this.renderRoot?.querySelector('.reveal-element');
                gsap.fromTo(box, 
                { 
                    autoAlpha: 0,
                    y: 50,
                    duration: 0.5,
                    ease: "power2.out"
                },
                {
                    autoAlpha: 1,
                    y: 0,
                    duration: 0.5,
                    ease: "power2.out"
                }
                );
            }

            hide(){
                const box = this.renderRoot?.querySelector('.reveal-element');
                gsap.fromTo(box, 
                {
                    autoAlpha: 1,
                    y: 0,
                    duration: 0.5,
                    ease: "power2.out"
                },
                { 
                    autoAlpha: 0,
                    y: 50,
                    duration: 0.5,
                    ease: "power2.out"
                }
                );
            }

            constructor() {
                super();
            }
            render() {
                return html`
                    <div class="reveal-element commentator-row" style="position: absolute; top: ${this.top}px; width: 1920px;">
                        ${this.names.map((entry, index) => { return html`
                            <div class="commentator-entry" style="height: ${this.height}px;">
                                <img src="./microphone.png" width=70/>${entry}    
                            </div>
                        `})}
                    </div>
                `;
            }
        }
        customElements.define('commentator-names', CommentatorNames);
    </script>

    <body style="width:1920px; height:1080px; background-image: url('image2.png');">
        <commentator-names id="comms" class="comm-names" names='["ERoadhouse","Anonymous"]' top="770" height="120"></commentator-names>
        <lower-thirds id="low-thirds" top="700" width="1600" contentBoxHeight="150" lowerThirdsHeader="Ladder League" headerText="What do we say here" mainText="Filler text for something and later"></lower-thirds>
    </body>
    <script type="module" src="../../../js/ladder_league_2026_top8.js"></script>

</html>

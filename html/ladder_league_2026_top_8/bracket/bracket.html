    <body style="width:1920px; height:1080px; background-image: url('LL26_MatchResults_Background.png')">

        <!--Col 1-->
        <div style="display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; position: absolute; top: 0px; left: 50px; height: 1080px; ">
            <bracket-box width="365" height="146" eventName="Quarterfinal 1" p1Name="ERoadhouse" p2Name="Jared" p1Seed="1" p2Seed="8" p1Time="2:20:20.10" p2Time="2:20:20"></bracket-box>
            <bracket-box width="365" height="146" eventName="Quarterfinal 2" p1Name="ERoadhouse" p2Name="Jared" p1Seed="1" p2Seed="8"></bracket-box>
            <bracket-box width="365" height="146" eventName="Quarterfinal 3" p1Name="ERoadhouse" p2Name="Jared" p1Seed="1" p2Seed="8"></bracket-box>

        </div>
        <div style="display: flex; flex-direction: column; justify-content: space-evenly; position: absolute; top: 0px; left: 500px; height: 1080px;">
            <bracket-box width="365" height="146" eventName="Semifinal 1" p1Name="ERoadhouse" p2Name="Jared" p1Seed="1" p2Seed="8"></bracket-box>
            <bracket-box width="365" height="146" eventName="Semifinal 2" p1Name="ERoadhouse" p2Name="Jared" p1Seed="1" p2Seed="8"></bracket-box>
        </div>
        <bracket-box left="1500" top="500" width="365" height="146" eventName="Grand Finals" p1Name="ERoadhouse" p2Name="Jared" p1Seed="1" p2Seed="8"></bracket-box>
        <bracket-box left="1500" top="700" width="365" height="146" eventName="3rd Place Match" p1Name="ERoadhouse" p2Name="Jared" p1Seed="1" p2Seed="8"></bracket-box> 
    </body>
    <script type="module">
        import { LitElement, html, css, nothing } from 'https://esm.run/lit';
        import {connectToSocket, getEventForHost, toStringTime} from '../../../js/automarathon.js'

        class BracketBox extends LitElement {
            static properties = {
                top: { type: Number },
                left: { type: Number },
                width: {type: Number },
                height: {type: Number},
                eventName: {type: String},
                p1Name: {type: String},
                p2Name: {type: String},
                p1Seed: {type: Number},
                p2Seed: {type: Number},
                p1Time: {type: String},
                p2Time: {type: String},
                eventTime: {type: Date}   
            };

            static styles = css`
                .box-style{
                    display: flex;
                    flex-direction: column;
                    justify-content: space-evenly;
                    background-color: var(--ladder-league-dark-blue);
                    color: var(--ladder-league-white);
                    font-family: "Rubik";
                    border-radius: 10px;
                    box-sizing: border-box; 
                    padding-left: 20px;
                    padding-right: 20px;
                    box-shadow: var(--ladder-league-dark-blue2) 0px 0px 8px inset;
                    border: 1px var(--ladder-league-white) solid;
                    text-shadow: var(--ladder-league-dark-blue2) 1px 1px 10px inset;
                }
                .box-header{
                    display: flex;
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                }
                .box-entry{
                    display: flex;
                    flex-direction: row;
                    justify-content: space-between;
                }
                .box-name{
                    font-weight: bold;
                    font-size: 1.2em;
                }
                .box-seed{

                }
                .box-event-name{
                    text-transform: uppercase;
                    font-weight:bold;
                    font-size: 1.3em;
                }

                .box-player-time{
                    font-size: 1.2em;
                }

                .box-name.win{
                    color: var(--ladder-league-green);
                }

                .box-name.lose{
                    color: var(--ladder-league-red);
                }

                .box-event-time{
                    font-size: 1.2em;
                }
            `;

            constructor() {
                super();
                this.eventTime = new Date();
            }
            render() {
                let dateString = this.eventTime ? this.eventTime.toLocaleTimeString('en-US', {
                    timeZone: 'America/New_York',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: true 
                }) : "-";

                var placementP1;
                var placementP2;

                var p1Tokens;
                var p2Tokens;
                var displayTimeP1 = "-";
                var displayTimeP2 = "-";

                
                if(this.p1Time){
                    p1Tokens = this.p1Time.split(".");
                    displayTimeP1 = p1Tokens[0].trim();
                }
                
                if(this.p2Time){
                    p2Tokens = this.p2Time.split(".");
                    displayTimeP2 = p2Tokens[0].trim();
                }
                

                if(this.p1Time && this.p2Time){
                    if(displayTimeP2.toLowerCase().includes("dnf")){
                        placementP1 = "1st";
                        placementP2 = "2nd";
                    }else if(displayTimeP1.toLowerCase().includes("dnf")){
                        placementP1 = "2nd";
                        placementP2 = "1st"
                    }else{
                        if(p1Tokens.length == 1){
                            p1Tokens.push("000");
                        }
                        if(p2Tokens.length == 1){
                            p2Tokens.push("000");
                        }

                        if((p1Tokens[0]+"."+p1Tokens[1]) < (p2Tokens[0]+"."+p2Tokens[1])){
                            placementP1 = "1st";
                            placementP2 = "2nd";
                        }else{
                            placementP1 = "2nd";
                            placementP2 = "1st"
                        }
                    }
                }

                return html`
                    <div class="box-style" style="${this.top ? "position: absolute; top: "+this.top +"px; left: " + this.left +"px;" : ""} width: ${this.width}px; height: ${this.height}px;">
                        <div class="box-header">
                            <div class="box-event-name">${this.eventName}</div>
                            <div class="box-event-time">${dateString} EDT</div>
                        </div>
                        <div class="box-entry">
                            <div style="display: flex; flex-direction: row; gap: 10px; align-items: center;">
                                <div class="box-seed">${this.p1Seed}</div>
                                <div class="box-name ${placementP1 ? (placementP1 == "1st" ? "win": "lose"): ""}">${this.p1Name || "-"}</div>
                            </div>
                            <div class="box-player-time">
                                ${displayTimeP1}
                            </div>
                        </div>
                        <hr style="width: 100%; margin-top: -6px; margin-bottom: -6px;">
                        <div class="box-entry">
                            <div style="display: flex; flex-direction: row; gap: 10px; align-items: center;">
                                <div class="box-seed">${this.p2Seed}</div>
                                <div class="box-name ${placementP2 ? (placementP2 == "1st" ? "win": "lose"): ""}">${this.p2Name || "-"}</div>
                            </div>
                            <div class="box-player-time">
                                 ${displayTimeP2}
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        customElements.define('bracket-box', BracketBox);
    </script>
</html>

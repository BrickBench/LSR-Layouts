<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
        <style>
            :root {
                --ladder-league-white: #cacacb;
                --ladder-league-shadow: #131524;
                --ladder-league-green: #6cc46c;
                --ladder-league-red: #e46a6a;
                --ladder-league-split-green: #95d895;
                --ladder-league-split-red: #e67b7b;
                --ladder-league-p1-color: #6cc46c;
                --ladder-league-p2-color: #00a2ff;
                --ladder-league-p3-color: #ffbc09;
                --ladder-league-bright-white: #dadadb;
                --ladder-league-grey: #A8A8A8;
                --ladder-league-blue: #1562D1;
                --ladder-league-gold: #FFC80B;
                --ladder-league-dark-blue: #1B243C;
                --ladder-league-teal: #193952;
                --transition-offset: 3.1s;
            }
        </style>
    </head>
    <body style="width:1920px; height:1080px; /*background-image: url('image.png')*/">
        <!--<countdown-bug  eventName="QUARTERFINAL 1" top="66" left="84" p1Name="Eroadhouse" p2Name="Jared" p1Seed="3" p2Seed="5" ></countdown-bug>-->
        <countdown-bug eventName="QUARTERFINAL 1" top="870" left="1390" p1Name="Eroadhouse" p2Name="WiiSuper" p1Seed="3" p2Seed="5" ></countdown-bug>
    </body>
    <script type="module">
        import { LitElement, html, css } from 'https://esm.run/lit';
        import {connectToSocket, getEventForHost, toStringTime} from '../../../js/automarathon.js'
        import { gsap } from "https://esm.sh/gsap";

        connectToSocket('/ws?high_rate=true', function(data) {
            const countdownElement = document.querySelector('countdown-bug');

            let cf = data.custom_fields;
            //countdownElement.countdownEndtime = cf['countdown-end-time'] ? parseInt(cf['countdown-end-time']) : 0;

            /*var event_id = getEventForHost(data, this_host);
            if (event_id == null) {
                return;
            }*/
        });

        class CountdownBug extends LitElement {
            static styles = css`
                :host {
                    font-family: Rubik;
                }
                .playerIconRegion{
                    display: flex; 
                    border-top-left-radius: 10px; 
                    border-bottom-left-radius: 10px; 
                    background-color: var(--ladder-league-dark-blue);
                    color: var(--ladder-league-white);
                    box-sizing: border-box;
                    padding: 20px;
                    height: 80px;
                    line-height: 80px;
                    flex-direction: row;
                    align-items: center;
                    justify-content: center;
                    gap: 10px;
                    text-transform: uppercase;
                    font-weight: bold;
                    text-align: center;
                    box-shadow: 4px 4px 16px rgba(0,0,0,0.5);
                }

                .top8Placeholder{
                    font-size: 2.82em;
                }

                .countdownRegion{
                    border-bottom-right-radius: 10px; 
                    color: var(--ladder-league-dark-blue);
                    background-color: var(--ladder-league-white);
                    box-sizing: border-box;
                    padding: 5px;
                    font-variant-numeric: tabular-nums; 
                    font-weight: bold;
                    font-size: 2.82em;
                    display: flex;
                    flex-direction: row;
                    align-items: center;
                    justify-content: center;
                    text-align: center;
                    height: 80px;
                    width: 220px;
                    box-shadow: 4px 4px 16px rgba(0,0,0,0.5);
                }
                .matchTitleRegion{
                    border-top-left-radius: 15px; 
                    border-top-right-radius: 15px; 
                    color: var(--ladder-league-white);
                    background-color: var(--ladder-league-teal);
                    align-items: flex-start;
                    box-sizing: border-box;
                    padding: 10px;
                    width: 380px; 
                    height: 42px;
                    display: grid;
                    grid-template-columns: 1fr;
                    grid-template-rows: 1fr;
                    font-size: 1.5em;
                    box-shadow: 0px 0px 10px rgba(0,0,0,0.1) inset;
                    text-align: center;
                }

                .matchTitleRegion > * {
                    grid-column: 1;
                    grid-row: 1;
                    font-style: italic;
                    text-transform: uppercase;
                }

                .ladder-icon{
                    height: 60px;
                }

                .img-icon{
                    width: 50px;
                    height: 50px;
                    background-color: white;
                }
                
                .vs-img{
                    font-size: 2em;
                }
            `;

            static properties = {
                countdownEndtime: { type: Number },
                _time: {type: Number},
                eventName: {type: String},
                top: {type: Number},
                left: {type: Number},
                p1Name: {type: String},
                p2Name: {type: String},
                p1Seed: {type: Number},
                p2Seed: {type: Number},
                p1Image: {type: String},
                p2Image: {type: String},
                _currSlide: {type: Number},
                lastSlideTransition: {type: Number}
            };

            static get transitionInterval() {
                return 13000;
            }
            static duration = 1;

            updateSlides(){
                const parent = this.renderRoot.querySelector('#bottom-scroll');
                if(this._currSlide == 1){
                    if(this.p1Name && this.p2Name){
                    }else{
                        this._currSlide = 0;
                    }
                }
                Array.from(parent.children).forEach((element,index) => {
                    gsap.set(element, { autoAlpha: (index == this._currSlide ? 1 : 0) });
                });
                this.lastSlideTransition = Date.now();
            }

            nextSlide(){
                let prevSlide = this._currSlide;
                if(this._currSlide == 0){
                    if(this.p1Name && this.p2Name){
                        this._currSlide = 1;
                    }
                }else{
                    this._currSlide = 0;
                }

                const parent = this.renderRoot.querySelector('#bottom-scroll');

                const tl = gsap.timeline();
                tl.to(parent.children[prevSlide], { autoAlpha: 0, duration: CountdownBug.duration })
                    .to(parent.children[this._currSlide], { autoAlpha: 1, duration: CountdownBug.duration }, `-=${CountdownBug.duration}`)

                this.lastSlideTransition = Date.now();
            }

            firstUpdated(changedProperties) {
                this.updateSlides();
            }

            constructor() {
                super();
                this._time = 0;
                this.countdownEndtime = Date.now() + 40000;
                this.lastSlideTransition = Date.now();
                this._currSlide = 0;
                window.setInterval(() => {
                    this._time = this.countdownEndtime ? (this.countdownEndtime - Date.now()) : -1;
                    if(Date.now() - this.lastSlideTransition > CountdownBug.transitionInterval){
                        this.nextSlide();
                    }
                }, 100);
            }

            get _formattedTime() {
                let countDownStr = toStringTime(this._time, false, true);
                if(!this._time || this._time < 0){
                    countDownStr = "00:00";
                }
                return `${countDownStr}`;
            }

            render() {
                return html`
                    <div style="display: flex; flex-direction: column; gap: 0px; width: 500px; position: absolute; top: ${this.top}px; left: ${this.left}px; align-items: flex-end;">
                        <div class="matchTitleRegion" id="bottom-scroll">
                            <div>
                                <b>UP NEXT: ${this.eventName}</b>
                            </div>
                            <div>
                            <b>${this.p1Name}</b> VS. <b>${this.p2Name}</b>
                            </div>
                        </div>
                        <div style="display: flex; flex-direction: row;">
                            <div class="playerIconRegion">
                                ${(!this.p1Image || !this.p2Image) ? html`
                                    <img src="./ladder.png" class="ladder-icon"/>
                                    <span class="top8Placeholder">TOP 8</span>
                                ` : html`
                                    <img class="img-icon" src=""/>
                                    <span class="vs-img">VS.</span>
                                    <img class="img-icon" src=""/>
                                `}
                            </div>
                            <div class="countdownRegion">
                                <span>${this._formattedTime}</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        customElements.define('countdown-bug', CountdownBug);
  </script>
</html>

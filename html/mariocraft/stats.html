<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <style>
            :root {
                --main-text-color: #CACACA;
            }
            .runner-box{
                display: flex;
                flex-direction: row;
                align-items: center;
                width: 100%;
                box-sizing: border-box;
                padding-left: 13px;
            }
            .profile-pic{
                width: 100px;
                height: 100px;
                border-radius: 10%;
            }
            .runner-name{
                font-family: 'Stopbuck';
                font-size: 4.80rem;
                text-align: center;
                color: var(--main-text-color);
                flex: 1;
            }
            .info-box{
                display: flex;
                flex-direction: column;
                gap: 30px;
                padding: 30px;
                box-sizing: border-box;
            }
            .pb{
                font-family: 'Broken Console';
                font-size: 3.20rem;
                color: var(--main-text-color);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .coach{
                font-family: 'Broken Console';
                font-size: 3.20rem;
                color: var(--main-text-color);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .facts{
                font-family: 'Broken Console';
                font-size: 2.50rem;
                color: var(--main-text-color);
                position:relative;
                top: -30px;
            }
            .facts-li{
                margin: 20px 0;
            }
            .match-name{
                font-family: 'Stopbuck';
                font-size: 5.80rem;
                text-align: center;
                color: var(--main-text-color);
                padding-top:40px;
                text-shadow: -5px -5px 0 #191919, 5px -5px 0 #191919, -5px 5px 0 #191919, 5px 5px 0 #191919;
            }
        </style>
    </head>
    <body style="width:1920px; height:1080px; background-image: url('MarioCraft_Stats3.png');">
        <div class="match-name" id="event-title">Winners Semis 1</div>
        <div class="runner-box" style="position: absolute; top: 186px; left: 194px; width: 647px; height: 125px">
            <image class="profile-pic" src="profiles/tyron.jpg" id="runner-1-pfp"></image>
            <div class="runner-name" id="runner-1-name">
                GTM&nbsp;&nbsp;&nbsp;
            </div>
        </div>
        <div class="runner-box" style="position: absolute; top: 186px; left: 1079px; width: 647px; height: 125px">
            <image class="profile-pic" src="profiles/greensuigi.jpg" id="runner-2-pfp"></image>
            <div class="runner-name" id="runner-2-name">
                GreenSuigi
            </div>
        </div>

        <div class="info-box" style="position: absolute; top: 340px; left: 194px; width: 647px; height: 535px">
            <div class="pb"><small>Best Time:</small> <span id="runner-1-pb">25:32</span></div>
            <div class="coach"><small>Coach:</small> <span id="runner-1-coach">k4yfour</span></div>
            <div class="facts">
                <ul>
                    <li class="facts-li" id="fact-1-1">Mario Odyssey WR Holder</li>
                    <li class="facts-li" id="fact-1-2">Mario Odyssey WR Holder</li>
                    <li class="facts-li" id="fact-1-3">Mario Odyssey WR Holder</li>
                </ul>
            </div>
        </div>

        <div class="info-box" style="position: absolute; top: 340px; left: 1079px; width: 647px; height: 535px">
            <div class="pb"><small>Best Time:</small> <span id="runner-2-pb">25:32</span></div>
            <div class="coach"><small>Coach:</small> <span id="runner-2-coach">poundcake</span></div>
            <div class="facts">
                <ul>
                    <li class="facts-li" id="fact-2-1">Mario Odyssey WR Holder</li>
                    <li class="facts-li" id="fact-2-2">Mario Odyssey WR Holder</li>
                    <li class="facts-li" id="fact-2-3">Mario Odyssey WR Holder</li>
                </ul>
            </div>
        </div>
    </body>
    <script type="module" src="../../js/mariocraft.js"></script>
</html>

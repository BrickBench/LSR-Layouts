<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../../css/ladder_league2026.css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>

        <style>
            .runner-bar-name {
                line-height: 75px;
                font-size: 3.3em;
                text-transform: uppercase;
            }
            .runner-bar-name-small {
                line-height: 37px;
                font-size: 1.4em;
                text-transform: uppercase;
            }
            .flag-scale {
                font-size: 0.9em;
            }
            .flag-scale-small {
                font-size: 0.9em;
            }
        </style>

        <script>
            window.addEventListener('obsSourceActiveChanged', function(event) {
                var matchBox = document.getElementById("fade-box");
                matchBox.classList.remove('hide');

                void matchBox.offsetWidth; 
                    
                matchBox.classList.add('hide');
            })
        </script>
    </head>
    <body style="width:1920px; height:1080px; background-image: url('LL26_LCQ_Clean_V5_ 3Comms.png');">
        <div id="fade-box" class="fade-hider hide" style="background-image: url('LL26_MatchResults_Background.png');"></div>
        <div class="timer-title-box" style="position: absolute; left: 1049px; top: 682px; width: 774px; height: 115px;">
            <div class="time-title-spacer"></div>
            <div id="match-title-split" class="match-title-box">
                <div>LCQ</div>
                <div>Race 1</div>
            </div>
            <div id="timer" class="timer">2:43:23</div>
        </div>

        <!-- Commentators -->
        <div id="commentator-box-1" class="commentary-box" style="position: absolute; left: 1077px; top: 802px; width: 237px; height: 54px;">
            <span class="commentator-name">LaserTrap</span><span class="commentator-pronoun">They/Them</span>
        </div> 

        <div  id="commentator-box-3"class="commentary-box" style="position: absolute; left: 1319px; top: 802px; width: 234px; height: 54px;">
            <span class="commentator-name">CaptainPaxo</span>

        <div id="commentator-box-2" class="commentary-box" style="position: absolute; left: 1558px; top: 802px; width: 235px; height: 54px;">

        </div> 

        <!-- Runner 1 -->
        <div class="runner-bar" style="position:absolute; left: 0px; top: 531px; width: 952px; height: 75px;">
            <div id="runner-1-name-flag" class="runner-bar-name">
                <span class="fi fi-gr flag-scale"></span>
                <span>Dragon67</span>
            </div>
        </div>
        <!-- Runner 2 -->
        <div class="runner-bar" style="position:absolute; left: 968px; top: 531px; width: 952px; height: 75px;">
            <div id="runner-2-name-flag" class="runner-bar-name">
                <span class="fi fi-us flag-scale"></span>
                <span>MelloVro</span>
            </div>
        </div>
        <!-- Runner 3 -->
        <div class="runner-bar" style="position:absolute; left: 0px; top: 880px; width: 470px; height: 37px;">
            <div id="runner-3-name-flag" class="runner-bar-name-small">
                <span class="fi fi-ch flag-scale-small"></span>
                <span>Dragon67</span>

        </div>

                <span class="fi fi-ir flag-scale-small"></span>
                <span>MelloVro</span>
            </div>
        </div>
        <!-- Bottom Bar -->
        <div id="bottom-lcq-bar" class="lcq-winners-bar" style="position:absolute; left: 76px; top: 949px; width: 717px; height: 101px;">
            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <span class="lcq-footer-box-position">1: </span>
                    <span id="lcq-p1" class="lcq-runner-name">Dragon67</span>
                </div>
                <div style="color: var(--ladder-league-green)">Leader</div>
            </div>
            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <span class="lcq-footer-box-position">2: </span>
                    <span id="lcq-p2" class="lcq-runner-name">GamerOlive</span>

                <div id="lcq-p2-delta" class="lcq-runner-delta">+23</div>

                    <!-- Remove the temp moveUp. This is to demonstrate the animation-->
                    <span class="lcq-footer-box-position">3: </span>
                    <span id="lcq-p3" class="lcq-runner-name">CaptainPaxo</span>
                </div>

                    <span id="lcq-p5" class="lcq-runner-name">GamerOlive</span>

                <div id="lcq-p5-delta" class="lcq-runner-delta">+23</div>

            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <span class="lcq-footer-box-position">6: </span>
                    <span id="lcq-p6" class="lcq-runner-name">CaptainPaxo</span>
                </div>
                <div id="lcq-p6-delta" class="lcq-runner-delta">+45</div>

            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <span class="lcq-footer-box-position">7: </span>
                    <span id="lcq-p7" class="lcq-runner-name">CaptainPaxo</span>
                </div>
                <div id="lcq-p7-delta" class="lcq-runner-delta">+1:05</div>
            </div>
        </div>
    </body>
    <script type="module" src="../..//js/ladder_league_2026.js"></script>
</html>

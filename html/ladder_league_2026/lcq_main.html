<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../../css/ladder_league2026.css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>

        <style>
            .runner-bar-name {
                line-height: 75px;
                font-size: 3.5em;
            }
            .runner-bar-name-small {
                line-height: 37px;
                font-size: 1.5em;
            }
            .flag-scale {
                font-size: 0.9em;
            }
            .flag-scale-small {
                font-size: 0.9em;
            }
        </style>
    </head>
    <body style="width:1920px; height:1080px; background-image: url('LL26_LCQ_Clean_V4.png');">

        <div class="timer-title-box" style="position: absolute; left: 1049px; top: 682px; width: 774px; height: 115px;">
            <div class="time-title-spacer"></div>
            <div id="match-title" class="match-title-box">
                <div>LCQ</div>
                <div>Race 1</div>
            </div>
            <div id="timer" class="timer">2:43:23</div>
        </div>

        <!-- Commentators -->
        <div class="commentary-box" style="position: absolute; left: 1077px; top: 802px; width: 250px; height: 54px;">
            <span class="commentator-name">LaserTrap</span><span class="commentator-pronoun">They/Them</span>
        </div> 

        <div class="commentary-box" style="position: absolute; left: 1544px; top: 802px; width: 250px; height: 54px;">
            <span class="commentator-name">CaptainPaxo</span>
        </div> 

        <!-- Runner 1 -->
        <div class="runner-bar" style="position:absolute; left: 0px; top: 531px; width: 952px; height: 75px;">
            <div id="runner-1-name" class="runner-bar-name">
                <span class="fi fi-gr flag-scale"></span>
                <span>Dragon67</span>
            </div>
        </div>
        <!-- Runner 2 -->
        <div class="runner-bar" style="position:absolute; left: 968px; top: 531px; width: 952px; height: 75px;">
            <div id="runner-2-name" class="runner-bar-name">
                <span class="fi fi-us flag-scale"></span>
                <span>MelloVro</span>
            </div>
        </div>
        <!-- Runner 3 -->
        <div class="runner-bar" style="position:absolute; left: 0px; top: 880px; width: 470px; height: 37px;">
            <div id="runner-3-name" class="runner-bar-name-small">
                <span class="fi fi-ch flag-scale-small"></span>
                <span>Dragon67</span>
            </div>
        </div>
        <!-- Runner 4 -->
        <div class="runner-bar" style="position:absolute; left: 482px; top: 880px; width: 470px; height: 37px;">
            <div id="runner-4-name" class="runner-bar-name-small">
                <span class="fi fi-ir flag-scale-small"></span>
                <span>MelloVro</span>
            </div>
        </div>
        <!-- Bottom Bar -->
        <div class="lcq-winners-bar" style="position:absolute; left: 76px; top: 949px; width: 717px; height: 101px;">
            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <span class="lcq-footer-box-position">1: </span>
                    <span class="lcq-runner-name">Dragon67</span>
                </div>
                <div style="color: var(--ladder-league-green)">Leader</div>
            </div>
            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <span class="lcq-footer-box-position">2: </span>
                    <span class="lcq-runner-name">GamerOlive</span>
                </div>
                <div>+23</div>
            </div>
            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <!-- Remove the temp moveUp. This is to demonstrate the animation-->
                    <span class="lcq-footer-box-position">3: </span>
                    <span class="lcq-runner-name moveUp">CaptainPaxo</span>
                </div>
                <div>+45</div>
            </div>
        </div>

        <div class="lcq-runner-up-bar" style="position:absolute; left: 872px; top: 949px; width: 964px; height: 101px;">
            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <!-- Remove the temp moveDown. This is to demonstrate the animation-->
                    <span class="lcq-footer-box-position">4: </span>
                    <span class="lcq-runner-name moveDown">Coolisen</span>
                </div>
                <div>+21</div>
            </div>
            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <span class="lcq-footer-box-position">5: </span>
                    <span class="lcq-runner-name">GamerOlive</span>
                </div>
                <div>+23</div>
            </div>
            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <span class="lcq-footer-box-position">6: </span>
                    <span class="lcq-runner-name">CaptainPaxo</span>
                </div>
                <div>+45</div>
            </div>
            <div class="lcq-footer-box">
                <div class="lcq-footer-box-top">
                    <span class="lcq-footer-box-position">7: </span>
                    <span class="lcq-runner-name">CaptainPaxo</span>
                </div>
                <div>+1:05</div>
            </div>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../../css/ladder_league2026.css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://fonts.cdnfonts.com/css/aurebesh" rel="stylesheet">
        <style>
            .video-background {
                position:absolute;
                top: 0px;
                left: 0px;
                width: 1920px;
                height: 1080px;
            }
            
        </style>
        <script>
            window.addEventListener('obsSourceActiveChanged', function(event) {
                var e1 = document.getElementById("fade-box");
                var e2 = document.getElementById("interview-header");
                var e3 = document.getElementById("interview-name");
                var e4 = document.getElementById("final-time-label");
                var e5= document.getElementById("final-time");
                var e6 = document.getElementById("inner-box");
                e1.classList.remove('hide');
                e2.classList.remove('moveRight');
                e3.classList.remove('moveRight');
                e4.classList.remove('moveRight');
                e5.classList.remove('moveRight');
                e6.classList.remove('moveRight');

                void e1.offsetWidth;
                void e2.offsetWidth; 
                void e3.offsetWidth; 
                void e4.offsetWidth; 
                void e5.offsetWidth; 
                void e6.offsetWidth; 
                    
                e1.classList.add('hide');
                e2.classList.add('moveRight');
                e3.classList.add('moveRight');
                e4.classList.add('moveRight');
                e5.classList.add('moveRight');
                e6.classList.add('moveRight');
            })
        </script>
    </head>
    <body>
        <video id="video-background" class="video-background" muted loop autoplay playsinline src="./Interview-COOLISEN-VADER.mp4"></video>
        <div id="fade-box" class="fade-hider hide" style="background-image: url('LL26_MatchResults_Background.png');"></div>
        <div class="interview-box" style="position:absolute; left: 155px; top: 383px; width: 718px; height: 343px;">
            <div id="interview-header" class="interview-box-header moveRight">Interview</div>
            <div id="inner-box" class="interview-inner-box moveRight">
                <div id="interview-name" class="interview-box-name moveRight">NOLAN</div>
                <div id="final-time-label" class="interview-box-time-label moveRight">FINAL TIME</div>
                <div id="final-time" class="interview-box-time moveRight">3:23:32</div>
            </div>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html style="background-color: transparent;">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../../css/ladder_league2026.css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://fonts.cdnfonts.com/css/aurebesh" rel="stylesheet">

        <script>
            window.addEventListener('obsSourceActiveChanged', function(event) {
                var e1 = document.getElementById("fade-box");
                var matchBox = document.getElementById("match-box");
                var runner1Box = document.getElementById("event-1-box");
                var runner2Box = document.getElementById("event-2-box");
                var runner3Box = document.getElementById("event-3-box");
                e1.classList.remove('hide');
                matchBox.classList.remove('moveRight');
                runner1Box.classList.remove('moveRight');
                runner2Box.classList.remove('moveRight');
                runner3Box.classList.remove('moveRight');

                void e1.offsetWidth;
                void matchBox.offsetWidth; 
                void runner1Box.offsetWidth; 
                void runner2Box.offsetWidth; 
                void runner3Box.offsetWidth; 
                    
                e1.classList.add('hide');
                matchBox.classList.add('moveRight');
                runner1Box.classList.add('moveRight');
                runner2Box.classList.add('moveRight');
                runner3Box.classList.add('moveRight');
            })
        </script>
    </head>
    <body style="width:1920px; height:1080px; background-image: url('LL26_Upcoming_Background.png'); z-index: -2;">
         <div id="fade-box" class="interview-fade-hider hide" style="background-image: url('LL26_MatchResults_Background.png'); z-index: -1;"></div>
        <div id="match-box" class="upcoming-header moveRight" style="position: absolute; left: 636px; top: 0px; width: 1079px; height: 307px;">

            </div>
            <div class="upcoming-header-caption">
                Upcoming Matches
            </div>
        </div>

        <div id="event-1-box" class="upcoming-top-box moveRight" style="position: absolute; top: 0px; left: 0px; width: 1920px; height: 1080px; background-image: url('LL26_Upcoming_TopBox.png');">
            <div class="upcoming-match" style="position: absolute; left: 636px; top: 307px; width: 1079px; height: 163px;">
                <div id="next-event-1" class="upcoming-match-name">Week 2 &#183; Rung 2</div>
                <div id="next-event-names-1" class="upcoming-match-participants">
                    <div>EROADHOUSE</div>
                    <div class="ll-blue">VS</div>
                    <div>FLAMINGLAZER</div>
                    <div class="ll-blue">VS</div>
                    <div>CAPTAINPAXO</div>
                </div>
                <div id="next-event-date-1" class="upcoming-match-schedule">
                    May 21st - 8:00PM EST
                </div>
            </div>
        </div>
        <div id="event-2-box" class="upcoming-center-box moveRight" style="position: absolute; top: 0px; left: 0px; width: 1920px; height: 1080px; background-image: url('LL26_Upcoming_MiddleBox.png');">

                <div id="next-event-2" class="upcoming-match-name">Top 8 &#183; Quarterfinals 1</div>
                <div id="next-event-names-2" class="upcoming-match-participants">

                    <div>FLAMINGLAZER</div>
                    <div class="ll-blue">VS</div>
                    <div>ANORAK</div>
                </div>
                <div id="next-event-date-2" class="upcoming-match-schedule">
                    May 21st - 8:00PM EST
                </div>
            </div>
        </div>
        <div id="event-3-box" class="upcoming-bottom-box moveRight" style="position: absolute; top: 0px; left: 2px; width: 1920px; height: 1080px; background-image: url('LL26_Upcoming_BottomBox.png');">
            <div class="upcoming-match" style="position: absolute; left: 636px; top: 757px; width: 1079px; height: 163px;">
                <div id="next-event-3" class="upcoming-match-name">LCQ &#183; Match 1</div>
                <div id="next-event-names-3" class="upcoming-match-participants">

                </div>

                    May 21st - 8:00PM EST
                </div>
            </div>
        </div>
        <script type="module" src="../../js/ladder_league_2026.js"></script>
    </body>
</html>
